<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FOCUS · by pushpraj</title>

   
      <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <link rel="manifest" id="manifestLink" />
    <script>
        (function() {
            const manifest = {
                name: "FOCUS",
                short_name: "FOCUS",
                description: "Focus timer with scenic backgrounds and session tracking.",
                start_url: ".",
                display: "standalone",
                background_color: "#0a0c10",
                theme_color: "#0a0c10",
                icons: [
                    { src: "logo.png", sizes: "192x192", type: "image/png" },
                    { src: "logo.png", sizes: "512x512", type: "image/png" }
                ]
            };
            const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            document.getElementById('manifestLink').href = url;
        })();
    </script>      

    <style>
        :root {
            --text-hi: rgba(255, 255, 255, 0.96);
            --text-lo: rgba(255, 255, 255, 0.65);
            --glass: rgba(255, 255, 255, 0.10);
            --glass-border: rgba(255, 255, 255, 0.22);
            --accent: rgba(255, 255, 255, 0.22);
            --accent-active: rgba(255, 255, 255, 0.35);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', "SF Pro Display", "Segoe UI", sans-serif;
        }

        body {
            position: relative;
        }

        /* ---- scenic background, crossfading ---- */
        .scene {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.4s ease;
            z-index: -3;
        }
        .scene.active {
            opacity: 1;
        }
        .scene.custom-bg {
            transition: opacity 0.8s ease;
        }

        .scene-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg,
                    rgba(10, 12, 16, 0.38) 0%,
                    rgba(10, 12, 16, 0.12) 30%,
                    rgba(10, 12, 16, 0.28) 68%,
                    rgba(10, 12, 16, 0.55) 100%);
            z-index: -2;
            pointer-events: none;
        }

        .vignette {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            box-shadow: inset 0 0 180px rgba(0, 0, 0, 0.45);
        }

        /* ---- top bar ---- */
        .top-bar {
            position: fixed;
            top: 20px;
            left: 26px;
            right: 26px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 5;
            color: var(--text-hi);
        }

        .logo {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: clamp(36px, 6vw, 76px);
            font-weight: 700;
            letter-spacing: 0.02em;
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
            line-height: 1.1;
        }
        .logo-sub {
            font-weight: 400;
            font-size: 0.32em;
            opacity: 0.8;
            letter-spacing: 0.15em;
            margin-top: -4px;
            text-transform: lowercase;
        }

        .top-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            line-height: 1.4;
        }

        /* Install button – now part of flow */
        .install-top {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 2px;
        }
        .install-top .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 14px;
            padding: 0;
        }
        .install-top .icon-btn.visible {
            display: flex;
        }
        .install-top .icon-btn:hover {
            background: rgba(255, 255, 255, 0.16);
            color: #6bcbff;
            border-color: rgba(107, 203, 255, 0.3);
        }
        .install-top .icon-btn svg {
            width: 16px;
            height: 16px;
        }

        .info-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .weather {
            font-size: clamp(13px, 1.2vw, 16px);
            font-weight: 500;
            color: var(--text-lo);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.02em;
            opacity: 0.9;
            min-height: 22px;
        }
        .weather .temp {
            font-weight: 600;
            color: var(--text-hi);
        }
        .weather .condition {
            font-weight: 400;
            color: var(--text-lo);
        }

        .today-total {
            font-size: clamp(13px, 1.2vw, 16px);
            font-weight: 500;
            color: var(--text-lo);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.02em;
            opacity: 0.9;
            min-height: 22px;
            white-space: nowrap;
        }
        .today-total .highlight {
            font-weight: 600;
            color: var(--text-hi);
        }

        .clock {
            font-size: clamp(13px, 1.1vw, 16px);
            font-weight: 500;
            color: var(--text-lo);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            font-variant-numeric: tabular-nums;
        }
        .running-time {
            font-size: clamp(13px, 1.1vw, 16px);
            font-weight: 500;
            color: var(--text-lo);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            font-variant-numeric: tabular-nums;
        }

        /* ---- stage ---- */
        .stage {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px;
        }

        /* ---- mode toggle ---- */
        .mode-toggle {
            display: flex;
            gap: 4px;
            padding: 4px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .mode-btn {
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.55);
            font-size: clamp(11px, 1.2vw, 14px);
            font-weight: 600;
            letter-spacing: 0.04em;
            padding: 6px 20px;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(.4, 0, .2, 1);
            font-family: inherit;
        }
        .mode-btn.active {
            background: rgba(255, 255, 255, 0.20);
            color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        .mode-btn:hover:not(.active) {
            color: rgba(255, 255, 255, 0.85);
        }

        .timer {
            font-size: clamp(80px, 16vw, 200px);
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--text-hi);
            font-variant-numeric: tabular-nums;
            text-shadow: 0 2px 40px rgba(0, 0, 0, 0.45), 0 0 60px rgba(255, 255, 255, 0.08);
            line-height: 1;
            user-select: none;
            transition: transform 0.6s cubic-bezier(.4, 0, .2, 1);
        }
        .timer.running {
            animation: breathe 4.5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }

        /* ---- timer controls (presets + custom) ---- */
        .timer-controls {
            display: none;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            margin-top: -4px;
        }
        .timer-controls.visible {
            display: flex;
        }

        .preset-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .preset-btn {
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(10px, 0.9vw, 12px);
            font-weight: 500;
            padding: 5px 14px;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            border: 1px solid rgba(255, 255, 255, 0.06);
            letter-spacing: 0.03em;
        }
        .preset-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
        }
        .preset-btn.active {
            background: rgba(255, 255, 255, 0.20);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.2);
        }
        .preset-btn.saved-preset {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .preset-btn.saved-preset .delete-preset {
            opacity: 0.4;
            font-size: 10px;
            margin-left: 2px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .preset-btn.saved-preset .delete-preset:hover {
            opacity: 1;
        }

        .custom-time-input {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .custom-time-input input {
            width: 60px;
            padding: 4px 8px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: clamp(11px, 0.9vw, 13px);
            font-weight: 500;
            font-family: inherit;
            text-align: center;
            outline: none;
            transition: border 0.2s;
        }
        .custom-time-input input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .custom-time-input input:focus {
            border-color: rgba(255, 255, 255, 0.4);
        }
        .custom-time-input input[type="number"]::-webkit-inner-spin-button,
        .custom-time-input input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .custom-time-input input[type="number"] {
            -moz-appearance: textfield;
        }
        .custom-time-input .set-btn {
            border: none;
            background: rgba(255, 255, 255, 0.10);
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(10px, 0.8vw, 12px);
            font-weight: 500;
            padding: 4px 14px;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            border: 1px solid rgba(255, 255, 255, 0.06);
            white-space: nowrap;
        }
        .custom-time-input .set-btn:hover {
            background: rgba(255, 255, 255, 0.20);
            color: #fff;
        }

        .state-label {
            margin-top: -4px;
            font-size: clamp(12px, 1.1vw, 15px);
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-lo);
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.3);
            min-height: 20px;
        }
  /* ---- Home Button (bottom left) ---- */
        .home-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 10;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text-hi);
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            text-decoration: none;
        }
        .home-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.15);
        }
        .home-btn:active {
            transform: scale(0.95);
        }
        .home-btn svg {
            width: 26px;
            height: 26px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
         .home-btn {
                bottom: 20px;
                left: 16px;
                width: 48px;
                height: 48px;
            }
            .home-btn svg {
                width: 22px;
                height: 22px;
            }
          .home-btn {
                bottom: 16px;
                left: 12px;
                width: 42px;
                height: 42px;
            }
            .home-btn svg {
                width: 18px;
                height: 18px;
            }
            .bg-toggle-btn {
                bottom: 16px;
                right: 12px;
                width: 42px;
                height: 42px;
                font-size: 18px;
            }
        
        /* ---- Session history panel ---- */
        .session-panel {
            position: fixed;
            bottom: clamp(140px, 15vh, 170px);
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            z-index: 6;
            width: 400px;
            max-width: calc(100vw - 32px);
            max-height: 55vh;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border-radius: 18px;
            padding: 16px;
            box-shadow: 0 20px 50px -20px rgba(0, 0, 0, 0.5);
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%) translateY(10px) scale(0.95);
            transition: all 0.3s cubic-bezier(.4, 0, .2, 1);
            display: flex;
            flex-direction: column;
            gap: 12px;
            color: var(--text-hi);
        }
        .session-panel.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0) scale(1);
        }
        .session-panel .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.02em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 8px;
        }
        .session-panel .header .close-btn {
            background: none;
            border: none;
            color: var(--text-lo);
            cursor: pointer;
            font-size: 20px;
            padding: 0 4px;
            transition: color 0.2s;
        }
        .session-panel .header .close-btn:hover {
            color: var(--text-hi);
        }
        .session-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 35vh;
        }
        .session-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            font-size: 12px;
            color: var(--text-lo);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .session-list li .session-date {
            font-weight: 500;
            color: var(--text-hi);
        }
        .session-list li .session-duration {
            font-weight: 500;
            color: var(--text-hi);
        }
        .session-list li .session-mode {
            font-size: 10px;
            background: rgba(255, 255, 255, 0.06);
            padding: 2px 10px;
            border-radius: 100px;
        }
        .session-list li .session-mode.stopwatch {
            color: #6bcbff;
        }
        .session-list li .session-mode.timer {
            color: #ffd93d;
        }
        .session-empty {
            color: var(--text-lo);
            font-size: 13px;
            text-align: center;
            padding: 20px 0;
            opacity: 0.6;
        }

        .session-panel .footer-stats {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-lo);
        }
        .session-panel .footer-stats .stat-value {
            font-weight: 600;
            color: var(--text-hi);
        }

        /* ---- Action Row (Start + Reset above control bar) ---- */
        .action-row {
            position: fixed;
            bottom: clamp(110px, 14vh, 150px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            display: flex;
            align-items: center;
            gap: clamp(14px, 1.6vw, 22px);
            padding: 0 6px;
        }

        .btn-start {
            border: none;
            cursor: pointer;
            font-family: inherit;
            color: #fff;
            font-size: clamp(17px, 1.7vw, 24px);
            font-weight: 600;
            letter-spacing: 0.04em;
            padding: clamp(16px, 1.6vw, 22px) clamp(40px, 4.5vw, 60px);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.3s cubic-bezier(.4, 0, .2, 1);
            min-width: clamp(110px, 13vw, 170px);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }
        .btn-start:hover {
            background: rgba(255, 255, 255, 0.28);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .btn-start:active {
            transform: translateY(0) scale(0.97);
        }

        .btn-reset-icon {
            width: clamp(48px, 4.5vw, 60px);
            height: clamp(48px, 4.5vw, 60px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.6);
            flex-shrink: 0;
        }
        .btn-reset-icon:hover {
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
        }
        .btn-reset-icon:active {
            transform: scale(0.94);
        }
        .btn-reset-icon svg {
            width: clamp(20px, 1.8vw, 26px);
            height: clamp(20px, 1.8vw, 26px);
        }

        /* ---- control bar ---- */
        .control-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            display: flex;
            align-items: center;
            gap: clamp(8px, 1vw, 16px);
            padding: clamp(8px, 0.8vw, 14px) clamp(12px, 1.2vw, 20px);
            border-radius: 22px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            box-shadow: 0 20px 50px -20px rgba(0, 0, 0, 0.5);
        }

        .icon-btn {
            width: clamp(36px, 3.5vw, 46px);
            height: clamp(36px, 3.5vw, 46px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.6);
            flex-shrink: 0;
            position: relative;
        }
        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
        }
        .icon-btn.on {
            color: #fff;
            background: rgba(255, 255, 255, 0.20);
        }
        .icon-btn svg {
            width: clamp(14px, 1.3vw, 18px);
            height: clamp(14px, 1.3vw, 18px);
        }

        /* ---- Ambient Popover ---- */
        .ambient-popover {
            position: fixed;
            bottom: clamp(140px, 15vh, 170px);
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            z-index: 6;
            display: flex;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 18px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            box-shadow: 0 20px 50px -20px rgba(0, 0, 0, 0.5);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(.4, 0, .2, 1);
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90vw;
        }
        .ambient-popover.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }
        .ambient-btn-option {
            border: none;
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            border: 1px solid rgba(255, 255, 255, 0.06);
            white-space: nowrap;
        }
        .ambient-btn-option:hover {
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
        }
        .ambient-btn-option.active {
            background: rgba(255, 255, 255, 0.20);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.2);
        }


        /* ---- scene picker popover (existing) ---- */
        .scene-picker {
            position: fixed;
            bottom: clamp(140px, 15vh, 170px);
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            z-index: 6;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px 14px 14px 14px;
            border-radius: 18px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            box-shadow: 0 20px 50px -20px rgba(0, 0, 0, 0.5);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(.4, 0, .2, 1);
            min-width: 280px;
            max-width: 92vw;
        }
        .scene-picker.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }

        .scene-picker .thumbs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

   <script>
    (function () {
        'use strict';

        // ---- DOM refs ----
        const timerDisplay = document.getElementById('timerDisplay');
        const startPauseBtn = document.getElementById('startPauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const soundToggle = document.getElementById('soundToggle');
        const sceneToggle = document.getElementById('sceneToggle');
        const ambientToggle = document.getElementById('ambientToggle');
        const ambientPopover = document.getElementById('ambientPopover');
        const scenePicker = document.getElementById('scenePicker');
        const clockEl = document.getElementById('clock');
        const runningTimeEl = document.getElementById('runningTime');
        const weatherDisplay = document.getElementById('weatherDisplay');
        const todayTotal = document.getElementById('todayTotal');
        const modeToggle = document.getElementById('modeToggle');
        const timerControls = document.getElementById('timerControls');
        const presetBtns = document.querySelectorAll('.preset-btn:not(.saved-preset)');
        const savedPresetsContainer = document.getElementById('savedPresets');
        const customMinutes = document.getElementById('customMinutes');
        const customSeconds = document.getElementById('customSeconds');
        const setCustomTime = document.getElementById('setCustomTime');
        const savePresetBtn = document.getElementById('savePresetBtn');
        const wakeIndicator = document.getElementById('wakeIndicator');
        const installBtn = document.getElementById('installBtn');
        const historyToggle = document.getElementById('historyToggle');
        const sessionPanel = document.getElementById('sessionPanel');
        const sessionList = document.getElementById('sessionList');
        const totalSessionsStat = document.getElementById('totalSessionsStat');
        const totalTimeStat = document.getElementById('totalTimeStat');
        const closeSessionBtn = document.getElementById('closeSessionBtn');
        const scenes = document.querySelectorAll('.scene');
        const thumbs = document.querySelectorAll('.scene-thumb:not(.custom-thumb)');
        const customThumb = document.getElementById('customThumb');
        const customPanel = document.getElementById('customPanel');
        const customUrlInput = document.getElementById('customUrlInput');
        const applyUrlBtn = document.getElementById('applyUrlBtn');
        const fileInput = document.getElementById('fileInput');
        const clearCustomBtn = document.getElementById('clearCustomBtn');
        const customStatus = document.getElementById('customStatus');
        const sceneCustom = document.getElementById('scene-custom');

        // ---- STATE ----
        let currentMode = 'stopwatch';
        let isRunning = false;
        let elapsedMs = 0;               // stopwatch: total elapsed
        let timerDurationMs = 1500000;   // timer: chosen duration (default 25 min)
        let remainingMs = 1500000;       // timer: what's left

        // Wall-clock based timing — keeps running when tab is backgrounded
        let startWallClock = 0;          // Date.now() when started/resumed
        let elapsedAtStart = 0;          // elapsed or consumed ms at the moment of start/resume

        let rafId = null;
        let bgCheckInterval = null;      // setInterval safety net for background completion

        // Sound state
        let tickingEnabled = false;
        let tickAudio = null;

        // Ambient state
        let currentAmbient = 'none';
        let ambientAudio = null;

        // Sessions
        let sessions = JSON.parse(localStorage.getItem('focus_sessions') || '[]');

        // Wake lock
        let wakeLock = null;

        // ---- FORMATTING ----
        function formatMs(ms) {
            const totalSeconds = Math.max(0, ms) / 1000;
            const mins = Math.floor(totalSeconds / 60);
            const secs = Math.floor(totalSeconds % 60);
            const cents = Math.floor((totalSeconds % 1) * 100);
            return String(mins).padStart(2, '0') + ':' +
                   String(secs).padStart(2, '0') + '.' +
                   String(cents).padStart(2, '0');
        }

        // ---- CALCULATE CURRENT TIME (wall-clock based) ----
        function getElapsedMs() {
            if (!isRunning) return elapsedMs;
            return elapsedAtStart + (Date.now() - startWallClock);
        }

        function getRemainingMs() {
            if (!isRunning) return remainingMs;
            return Math.max(0, remainingMs - (Date.now() - startWallClock));
        }

        // ---- DISPLAY UPDATE ----
        function updateDisplay() {
            if (currentMode === 'stopwatch') {
                timerDisplay.textContent = formatMs(getElapsedMs());
            } else {
                timerDisplay.textContent = formatMs(getRemainingMs());
            }
        }

        // ---- CLOCK ----
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            clockEl.textContent = h + ':' + m;
            runningTimeEl.textContent = h + ':' + m + ':' + s;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ---- TODAY TOTAL ----
        function updateTodayTotal() {
            const today = new Date().toDateString();
            let totalMs = 0;
            sessions.forEach(function (s) {
                if (new Date(s.date).toDateString() === today) {
                    totalMs += s.durationMs;
                }
            });
            const totalMin = Math.round(totalMs / 60000);
            todayTotal.innerHTML = '🎯 <span class="highlight">' + totalMin + 'm</span>';
        }
        updateTodayTotal();

        // ---- WEATHER ----
        function fetchWeather() {
            if (!navigator.geolocation) {
                weatherDisplay.innerHTML = '⛅ <span class="condition">N/A</span> <span class="temp">--°</span>';
                return;
            }
            navigator.geolocation.getCurrentPosition(
                function (pos) {
                    fetch('https://api.open-meteo.com/v1/forecast?latitude=' + pos.coords.latitude + '&longitude=' + pos.coords.longitude + '&current_weather=true')
                        .then(function (r) { return r.json(); })
                        .then(function (data) {
                            var w = data.current_weather;
                            var code = w.weathercode;
                            var icon = '☀️';
                            if (code >= 1 && code <= 3) icon = '⛅';
                            else if (code >= 45 && code <= 48) icon = '🌫️';
                            else if (code >= 51 && code <= 67) icon = '🌧️';
                            else if (code >= 71 && code <= 77) icon = '❄️';
                            else if (code >= 80 && code <= 82) icon = '🌦️';
                            else if (code >= 95) icon = '⛈️';
                            weatherDisplay.innerHTML = icon + ' <span class="temp">' + Math.round(w.temperature) + '°</span>';
                        })
                        .catch(function () {
                            weatherDisplay.innerHTML = '⛅ <span class="condition">--</span> <span class="temp">--°</span>';
                        });
                },
                function () {
                    weatherDisplay.innerHTML = '⛅ <span class="condition">--</span> <span class="temp">--°</span>';
                }
            );
        }
        fetchWeather();

        // =============================
        //  MODE TOGGLE
        // =============================
        var modeBtns = modeToggle.querySelectorAll('.mode-btn');
        modeBtns.forEach(function (btn) {
            btn.addEventListener('click', function () {
                if (isRunning) return;
                var mode = btn.getAttribute('data-mode');
                if (mode === currentMode) return;
                modeBtns.forEach(function (b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentMode = mode;
                if (currentMode === 'timer') {
                    timerControls.classList.add('visible');
                    remainingMs = timerDurationMs;
                } else {
                    timerControls.classList.remove('visible');
                    elapsedMs = 0;
                }
                updateDisplay();
                timerDisplay.classList.remove('running');
            });
        });

        // =============================
        //  PRESET BUTTONS
        // =============================
        presetBtns.forEach(function (btn) {
            btn.addEventListener('click', function () {
                if (isRunning) return;
                var secs = parseInt(btn.getAttribute('data-seconds'), 10);
                timerDurationMs = secs * 1000;
                remainingMs = timerDurationMs;
                presetBtns.forEach(function (b) { b.classList.remove('active'); });
                btn.classList.add('active');
                updateDisplay();
            });
        });

        setCustomTime.addEventListener('click', function () {
            if (isRunning) return;
            var m = parseInt(customMinutes.value, 10) || 0;
            var s = parseInt(customSeconds.value, 10) || 0;
            if (m <= 0 && s <= 0) return;
            timerDurationMs = (m * 60 + s) * 1000;
            remainingMs = timerDurationMs;
            presetBtns.forEach(function (b) { b.classList.remove('active'); });
            updateDisplay();
        });

        savePresetBtn.addEventListener('click', function () {
            if (isRunning) return;
            var m = parseInt(customMinutes.value, 10) || 0;
            var s = parseInt(customSeconds.value, 10) || 0;
            if (m <= 0 && s <= 0) return;
            var totalSecs = m * 60 + s;
            var saved = JSON.parse(localStorage.getItem('focus_presets') || '[]');
            if (saved.indexOf(totalSecs) === -1) {
                saved.push(totalSecs);
                localStorage.setItem('focus_presets', JSON.stringify(saved));
            }
            renderSavedPresets();
        });

        function renderSavedPresets() {
            var saved = JSON.parse(localStorage.getItem('focus_presets') || '[]');
            savedPresetsContainer.innerHTML = '';
            saved.forEach(function (secs) {
                var m = Math.floor(secs / 60);
                var s = secs % 60;
                var label = (m > 0 ? m + 'm' : '') + (s > 0 ? s + 's' : '');
                var btn = document.createElement('button');
                btn.className = 'preset-btn saved-preset';
                btn.setAttribute('data-seconds', secs);
                btn.innerHTML = label + ' <span class="delete-preset">✕</span>';
                btn.addEventListener('click', function (e) {
                    if (e.target.classList.contains('delete-preset')) {
                        var arr = JSON.parse(localStorage.getItem('focus_presets') || '[]');
                        arr = arr.filter(function (v) { return v !== secs; });
                        localStorage.setItem('focus_presets', JSON.stringify(arr));
                        renderSavedPresets();
                        return;
                    }
                    if (isRunning) return;
                    timerDurationMs = secs * 1000;
                    remainingMs = timerDurationMs;
                    presetBtns.forEach(function (b) { b.classList.remove('active'); });
                    updateDisplay();
                });
                savedPresetsContainer.appendChild(btn);
            });
        }
        renderSavedPresets();

        // =============================
        //  START / PAUSE
        // =============================
        startPauseBtn.addEventListener('click', function () {
            if (isRunning) { pause(); } else { start(); }
        });

        function start() {
            isRunning = true;
            // Snapshot wall-clock time so we can compute elapsed even when tab is hidden
            startWallClock = Date.now();
            if (currentMode === 'stopwatch') {
                elapsedAtStart = elapsedMs;
            } else {
                elapsedAtStart = 0; // elapsedAtStart = how much of remainingMs has been consumed
            }
            startPauseBtn.textContent = 'Pause';
            timerDisplay.classList.add('running');
            requestWakeLock();
            tick();
            startBgCheck();  // safety net: fires completion even in background
            if (tickingEnabled) startTickSound();
        }

        function pause() {
            // Freeze current values from wall-clock before stopping
            if (currentMode === 'stopwatch') {
                elapsedMs = getElapsedMs();
            } else {
                remainingMs = getRemainingMs();
            }
            isRunning = false;
            cancelAnimationFrame(rafId);
            rafId = null;
            stopBgCheck();
            startPauseBtn.textContent = 'Resume';
            timerDisplay.classList.remove('running');
            releaseWakeLock();
            stopTickSound();
        }

        function tick() {
            if (!isRunning) return;
            updateDisplay();
            rafId = requestAnimationFrame(tick);
        }

        // ---- Background safety check ----
        // rAF stops when tab is hidden. This setInterval keeps running
        // (browsers throttle to ~1/sec in background, which is enough)
        // and fires the completion event at the right moment.
        function startBgCheck() {
            stopBgCheck();
            bgCheckInterval = setInterval(function () {
                if (!isRunning) return;
                if (currentMode === 'timer' && getRemainingMs() <= 0) {
                    // Timer expired while tab was in background
                    timerComplete();
                }
            }, 500);
        }
        function stopBgCheck() {
            if (bgCheckInterval) {
                clearInterval(bgCheckInterval);
                bgCheckInterval = null;
            }
        }

        // ---- Also update display when tab becomes visible again ----
        document.addEventListener('visibilitychange', function () {
            if (!document.hidden && isRunning) {
                updateDisplay();
            }
        });

        function timerComplete() {
            // Freeze values
            if (currentMode === 'stopwatch') {
                elapsedMs = getElapsedMs();
            } else {
                remainingMs = 0;
            }
            isRunning = false;
            cancelAnimationFrame(rafId);
            rafId = null;
            stopBgCheck();
            startPauseBtn.textContent = 'Start';
            timerDisplay.classList.remove('running');
            releaseWakeLock();
            stopTickSound();
            updateDisplay();

            // Save session
            saveSession(timerDurationMs, 'timer');

            // Play notification sound
            try {
                var ctx = new (window.AudioContext || window.webkitAudioContext)();
                var notes = [523.25, 659.25, 783.99, 1046.50];
                notes.forEach(function (freq, i) {
                    var osc = ctx.createOscillator();
                    var gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.18);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.5);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime + i * 0.18);
                    osc.stop(ctx.currentTime + i * 0.18 + 0.5);
                });
            } catch (e) {}

            // Reset timer after completion
            remainingMs = timerDurationMs;
            setTimeout(function () { updateDisplay(); }, 2000);

            // Notification
            if (Notification.permission === 'granted') {
                new Notification('FOCUS · Timer Complete!', { body: 'Great work! Take a break.' });
            }
        }

        // =============================
        //  RESET
        // =============================
        resetBtn.addEventListener('click', function () {
            // Save stopwatch session if meaningful (capture phase — runs before display reset)
            if (currentMode === 'stopwatch' && getElapsedMs() >= 5000) {
                saveSession(getElapsedMs(), 'stopwatch');
            }

            isRunning = false;
            cancelAnimationFrame(rafId);
            rafId = null;
            stopBgCheck();
            startPauseBtn.textContent = 'Start';
            timerDisplay.classList.remove('running');
            releaseWakeLock();
            stopTickSound();

            if (currentMode === 'stopwatch') {
                elapsedMs = 0;
            } else {
                remainingMs = timerDurationMs;
            }
            updateDisplay();
        });

        // =============================
        //  SESSIONS
        // =============================
        function saveSession(durationMs, mode) {
            var session = {
                date: new Date().toISOString(),
                durationMs: durationMs,
                mode: mode
            };
            sessions.unshift(session);
            if (sessions.length > 200) sessions = sessions.slice(0, 200);
            localStorage.setItem('focus_sessions', JSON.stringify(sessions));
            updateTodayTotal();
        }

        function renderSessions() {
            sessionList.innerHTML = '';
            if (sessions.length === 0) {
                sessionList.innerHTML = '<li class="session-empty">No sessions yet. Start focusing!</li>';
            } else {
                sessions.slice(0, 50).forEach(function (s) {
                    var li = document.createElement('li');
                    var d = new Date(s.date);
                    var dateStr = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' ' +
                                  d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
                    var durMs = s.durationMs;
                    var durMin = Math.floor(durMs / 60000);
                    var durSec = Math.round((durMs % 60000) / 1000);
                    var durStr = durMin > 0 ? durMin + 'm ' + durSec + 's' : durSec + 's';
                    li.innerHTML = '<span class="session-date">' + dateStr + '</span>' +
                                   '<span class="session-mode ' + s.mode + '">' + (s.mode === 'stopwatch' ? 'Stopwatch' : 'Timer') + '</span>' +
                                   '<span class="session-duration">' + durStr + '</span>';
                    sessionList.appendChild(li);
                });
            }
            totalSessionsStat.textContent = sessions.length;
            var totalMs = 0;
            sessions.forEach(function (s) { totalMs += s.durationMs; });
            totalTimeStat.textContent = Math.round(totalMs / 60000) + 'm';
        }

        historyToggle.addEventListener('click', function () {
            closeAllPopovers();
            renderSessions();
            sessionPanel.classList.toggle('open');
            historyToggle.classList.toggle('on');
        });
        closeSessionBtn.addEventListener('click', function () {
            sessionPanel.classList.remove('open');
            historyToggle.classList.remove('on');
        });

        // =============================
        //  TICKING SOUND
        // =============================
        function startTickSound() {
            if (tickAudio) return;
            try {
                var ctx = new (window.AudioContext || window.webkitAudioContext)();
                var bufSize = ctx.sampleRate * 0.02;
                var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                var data = buf.getChannelData(0);
                for (var i = 0; i < bufSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * 0.04;
                }
                tickAudio = { ctx: ctx, buf: buf, interval: null };
                var lastSec = -1;
                tickAudio.interval = setInterval(function () {
                    if (!isRunning) return;
                    var sec;
                    if (currentMode === 'stopwatch') {
                        sec = Math.floor(getElapsedMs() / 1000);
                    } else {
                        sec = Math.floor(getRemainingMs() / 1000);
                    }
                    if (sec !== lastSec) {
                        lastSec = sec;
                        var src = ctx.createBufferSource();
                        src.buffer = buf;
                        src.connect(ctx.destination);
                        src.start();
                    }
                }, 50);
            } catch (e) {}
        }
        function stopTickSound() {
            if (tickAudio) {
                clearInterval(tickAudio.interval);
                tickAudio = null;
            }
        }
        soundToggle.addEventListener('click', function () {
            tickingEnabled = !tickingEnabled;
            soundToggle.classList.toggle('on', tickingEnabled);
            if (isRunning && tickingEnabled) {
                startTickSound();
            } else {
                stopTickSound();
            }
        });

        // =============================
        //  AMBIENT SOUNDS
        // =============================
        var ambientUrls = {
            none: null,
            forest: 'https://cdn.freesound.org/previews/542/542455_6386622-lq.mp3',
            waves: 'https://cdn.freesound.org/previews/424/424873_1738812-lq.mp3',
            waterfall: 'https://cdn.freesound.org/previews/374/374543_6288662-lq.mp3',
            cafe: 'https://cdn.freesound.org/previews/533/533564_6288662-lq.mp3',
            night: 'https://cdn.freesound.org/previews/348/348867_5765761-lq.mp3'
        };
        var ambientBtns = ambientPopover.querySelectorAll('.ambient-btn-option');
        ambientToggle.addEventListener('click', function () {
            closeAllPopovers();
            ambientPopover.classList.toggle('open');
            ambientToggle.classList.toggle('on', ambientPopover.classList.contains('open'));
        });
        ambientBtns.forEach(function (btn) {
            btn.addEventListener('click', function () {
                var sound = btn.getAttribute('data-sound');
                currentAmbient = sound;
                ambientBtns.forEach(function (b) { b.classList.remove('active'); });
                btn.classList.add('active');
                if (ambientAudio) {
                    ambientAudio.pause();
                    ambientAudio = null;
                }
                if (sound !== 'none' && ambientUrls[sound]) {
                    ambientAudio = new Audio(ambientUrls[sound]);
                    ambientAudio.loop = true;
                    ambientAudio.volume = 0.5;
                    ambientAudio.play().catch(function () {});
                }
            });
        });

        // =============================
        //  SCENE PICKER
        // =============================
        sceneToggle.addEventListener('click', function () {
            closeAllPopovers();
            scenePicker.classList.toggle('open');
            sceneToggle.classList.toggle('on', scenePicker.classList.contains('open'));
        });

        thumbs.forEach(function (thumb) {
            thumb.addEventListener('click', function () {
                var sceneId = thumb.getAttribute('data-scene');
                switchScene(sceneId);
                thumbs.forEach(function (t) { t.classList.remove('active'); });
                customThumb.classList.remove('active');
                thumb.classList.add('active');
                customPanel.classList.remove('open');
                sceneCustom.style.display = 'none';
            });
        });

        customThumb.addEventListener('click', function () {
            thumbs.forEach(function (t) { t.classList.remove('active'); });
            customThumb.classList.add('active');
            customPanel.classList.toggle('open');
        });

        function switchScene(sceneId) {
            scenes.forEach(function (s) { s.classList.remove('active'); });
            var el = document.getElementById(sceneId);
            if (el) el.classList.add('active');
            localStorage.setItem('focus_scene', sceneId);
        }

        applyUrlBtn.addEventListener('click', function () {
            var url = customUrlInput.value.trim();
            if (!url) return;
            sceneCustom.style.backgroundImage = 'url("' + url + '")';
            sceneCustom.style.display = 'block';
            switchScene('scene-custom');
            customStatus.textContent = 'Applied!';
            customStatus.className = 'status-msg success';
            setTimeout(function () { customStatus.textContent = ''; }, 2000);
        });

        fileInput.addEventListener('change', function () {
            var file = fileInput.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function (e) {
                sceneCustom.style.backgroundImage = 'url("' + e.target.result + '")';
                sceneCustom.style.display = 'block';
                switchScene('scene-custom');
                customStatus.textContent = 'Photo applied!';
                customStatus.className = 'status-msg success';
                setTimeout(function () { customStatus.textContent = ''; }, 2000);
            };
            reader.readAsDataURL(file);
        });

        clearCustomBtn.addEventListener('click', function () {
            sceneCustom.style.backgroundImage = 'none';
            sceneCustom.style.display = 'none';
            customUrlInput.value = '';
            customPanel.classList.remove('open');
            customThumb.classList.remove('active');
            switchScene('scene-rain');
            thumbs.forEach(function (t) { t.classList.remove('active'); });
            thumbs[0].classList.add('active');
            customStatus.textContent = 'Reset to default';
            customStatus.className = 'status-msg';
            setTimeout(function () { customStatus.textContent = ''; }, 2000);
        });

        var savedScene = localStorage.getItem('focus_scene');
        if (savedScene) {
            var el = document.getElementById(savedScene);
            if (el) {
                switchScene(savedScene);
                thumbs.forEach(function (t) { t.classList.remove('active'); });
                customThumb.classList.remove('active');
                var match = document.querySelector('.scene-thumb[data-scene="' + savedScene + '"]');
                if (match) match.classList.add('active');
            }
        }

        // =============================
        //  CLOSE POPOVERS
        // =============================
        function closeAllPopovers() {
            scenePicker.classList.remove('open');
            ambientPopover.classList.remove('open');
            sessionPanel.classList.remove('open');
            sceneToggle.classList.remove('on');
            ambientToggle.classList.remove('on');
            historyToggle.classList.remove('on');
        }

        document.addEventListener('click', function (e) {
            if (!scenePicker.contains(e.target) && !sceneToggle.contains(e.target) &&
                !ambientPopover.contains(e.target) && !ambientToggle.contains(e.target) &&
                !sessionPanel.contains(e.target) && !historyToggle.contains(e.target)) {
                closeAllPopovers();
            }
        });

        // =============================
        //  WAKE LOCK
        // =============================
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeIndicator.classList.add('active');
                    wakeLock.addEventListener('release', function () {
                        wakeIndicator.classList.remove('active');
                    });
                }
            } catch (e) {}
        }
        function releaseWakeLock() {
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        // =============================
        //  PWA INSTALL
        // =============================
        var deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', function (e) {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
            installBtn.classList.add('visible');
        });
        installBtn.addEventListener('click', function () {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function () {
                    deferredPrompt = null;
                    installBtn.classList.remove('visible');
                    installBtn.classList.add('hidden');
                });
            }
        });

        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        // ---- INIT ----
        updateDisplay();
    })();
</script>
    
</body>
</html>
