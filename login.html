<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0a0c10"><title>Sign in · FOCUS</title><link rel="icon" href="logo.png"><link rel="manifest" href="manifest.webmanifest"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script><script src="supabase-config.js" defer></script><script src="login.js" defer></script><style>:root{color:#f8fafc;background:#0a0c10;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{min-height:100vh;margin:0;padding:clamp(16px,4vw,42px);display:grid;place-items:center;overflow-x:hidden}.scene,.overlay,.vignette{position:fixed;inset:0;pointer-events:none}.scene{z-index:-3;background:center/cover url('https://flocus.com/aesthetic-stopwatch/resources/images/themes/b075c800cadd3c9d930f.jpg')}.overlay{z-index:-2;background:linear-gradient(180deg,#0a0c1066,#0a0c1026 36%,#0a0c10ad)}.vignette{z-index:-1;box-shadow:inset 0 0 180px #0009}.shell{width:min(100%,980px);min-height:570px;display:grid;grid-template-columns:1.1fr .9fr;border:1px solid #ffffff3d;border-radius:26px;overflow:hidden;background:#09101682;box-shadow:0 30px 90px #000b;backdrop-filter:blur(18px)}.intro{padding:clamp(32px,6vw,64px);background:linear-gradient(145deg,#07131a9c,#ffffff0a);display:flex;flex-direction:column}.brand{display:flex;gap:11px;align-items:center;font-weight:800;letter-spacing:.13em}.brand img{width:42px;height:42px;border-radius:12px}.intro h1{font-size:clamp(38px,6vw,62px);line-height:1.02;margin:auto 0 18px}.intro p{max-width:390px;color:#d3e0e7;font-size:17px;line-height:1.6;margin:0}.benefits{margin-top:32px;color:#e4f0f5;line-height:2}.panel{padding:clamp(28px,5vw,52px);display:flex;align-items:center;background:#09101678}.form{width:100%;max-width:365px;margin:auto}h2{font-size:29px;margin:0 0 8px}.sub{color:#c2d0d8;margin:0 0 22px;line-height:1.5}.field{margin:12px 0}.field label{display:block;margin:0 0 7px;color:#dce8ed;font-size:13px}.field input{width:100%;padding:14px;border:1px solid #ffffff52;border-radius:11px;background:#0710148c;color:#fff;font:inherit;outline:0}.field input:focus{border-color:#76d5ff;box-shadow:0 0 0 3px #76d5ff2b}.primary{width:100%;padding:14px;border:0;border-radius:11px;font:700 14px system-ui;cursor:pointer;margin-top:10px;background:#76d5ff;color:#062030}.note{min-height:20px;color:#ffe0a6;font-size:13px;margin:14px 0 0;line-height:1.45}.tiny{color:#b7c7d0;font-size:12px;line-height:1.5;margin:18px 0 0}@media(max-width:720px){body{display:block;padding:0}.shell{min-height:100vh;width:100%;grid-template-columns:1fr;border:0;border-radius:0}.intro{min-height:245px;padding:28px 24px}.intro h1{margin:42px 0 10px;font-size:42px}.intro p{font-size:15px}.benefits{display:none}.panel{padding:32px 24px 42px;align-items:flex-start}.form{max-width:none}.scene{background-position:58% center}}</style></head><body><div class="scene"></div><div class="overlay"></div><div class="vignette"></div><main class="shell"><section class="intro"><div class="brand"><img src="logo.png" alt="">FOCUS</div><h1>Focus anywhere.</h1><p>Keep your timers, tasks and progress with you on every device.</p><div class="benefits">✓ Secure account access<br>✓ Your data stays private<br>✓ Sync across your devices</div></section><section class="panel"><form class="form" id="login-form"><h2>Welcome back</h2><p class="sub">Sign in with your email and password.</p><div class="field"><label for="email">Email address</label><input id="email" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com" required></div><div class="field"><label for="password">Password</label><input id="password" type="password" autocomplete="current-password" placeholder="Your password" required></div><button class="primary" id="login-button" type="submit">Sign in</button><p class="note" id="note" role="status"></p><p class="tiny">This app uses email and password sign-in only.</p></form></section></main></body></html>
