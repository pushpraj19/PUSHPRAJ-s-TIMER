<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO · by pushpraj</title>

    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <link rel="manifest" id="manifestLink" />
    <script>
        (function() {
            const manifest = {
                name: "FOCUS",
                short_name: "FOCUS",
                description: "Focus timer with scenic backgrounds and session tracking.",
                start_url: ".",
                display: "standalone",
                background_color: "#0a0c10",
                theme_color: "#0a0c10",
                icons: [
                    { src: "logo.png", sizes: "192x192", type: "image/png" },
                    { src: "logo.png", sizes: "512x512", type: "image/png" }
                ]
            };
            const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            document.getElementById('manifestLink').href = url;
        })();
    </script>
<script src="bg-timer.js"></script>
<script>
    const origUpdateClockTodo = updateClock;
    updateClock = function() {
        origUpdateClockTodo();
        const bgState = BgTimer.getState();
        if (bgState && bgState.isRunning) {
            document.getElementById('runningTime').textContent = "⏱ " + BgTimer.formatTime(BgTimer.getElapsed(bgState));
        }
    };
    updateClock();
    setInterval(updateClock, 1000);
</script>
    <style>
        :root {
            --text-hi: rgba(255, 255, 255, 0.96);
            --text-lo: rgba(255, 255, 255, 0.65);
            --glass: rgba(255, 255, 255, 0.10);
            --glass-border: rgba(255, 255, 255, 0.22);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', "SF Pro Display", "Segoe UI", sans-serif;
        }

        body {
            position: relative;
        }

        /* ---- background ---- */
        .scene {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.2s ease;
            z-index: -3;
        }
        .scene.active {
            opacity: 1;
        }

        .scene-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg,
                    rgba(10, 12, 16, 0.30) 0%,
                    rgba(10, 12, 16, 0.10) 40%,
                    rgba(10, 12, 16, 0.25) 70%,
                    rgba(10, 12, 16, 0.50) 100%);
            z-index: -2;
            pointer-events: none;
        }

        .vignette {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            box-shadow: inset 0 0 180px rgba(0, 0, 0, 0.45);
        }

        /* ---- top bar ---- */
        .top-bar {
            position: fixed;
            top: 20px;
            left: 26px;
            right: 26px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 5;
            color: var(--text-hi);
        }

        .logo {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: clamp(36px, 6vw, 76px);
            font-weight: 700;
            letter-spacing: 0.02em;
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
            line-height: 1.1;
        }
        .logo-sub {
            font-weight: 400;
            font-size: 0.32em;
            opacity: 0.8;
            letter-spacing: 0.15em;
            margin-top: -4px;
            text-transform: lowercase;
        }

        .top-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            line-height: 1.4;
        }

        .install-top {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 2px;
        }
        .install-top .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 14px;
            padding: 0;
        }
        .install-top .icon-btn.visible {
            display: flex;
        }
        .install-top .icon-btn:hover {
            background: rgba(255, 255, 255, 0.16);
            color: #6bcbff;
            border-color: rgba(107, 203, 255, 0.3);
        }
        .install-top .icon-btn svg {
            width: 16px;
            height: 16px;
        }

        .info-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .weather {
            font-size: clamp(13px, 1.2vw, 16px);
            font-weight: 500;
            color: var(--text-lo);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.02em;
            opacity: 0.9;
            min-height: 22px;
        }
        .weather .temp {
            font-weight: 600;
            color: var(--text-hi);
        }

        .clock {
            font-size: clamp(13px, 1.1vw, 16px);
            font-weight: 500;
            color: var(--text-lo);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            font-variant-numeric: tabular-nums;
        }
        .running-time {
            font-size: clamp(13px, 1.1vw, 16px);
            font-weight: 500;
            color: var(--text-lo);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            font-variant-numeric: tabular-nums;
        }

        /* ---- stage ---- */
        .stage {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-top: 100px;
        }

        /* ---- todo main container ---- */
        .todo-main {
            width: 100%;
            max-width: 700px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(28px) saturate(160%);
            -webkit-backdrop-filter: blur(28px) saturate(160%);
            border-radius: 28px;
            padding: 32px 32px 26px;
            box-shadow: 0 24px 60px -24px rgba(0, 0, 0, 0.6);
            color: var(--text-hi);
            max-height: calc(100vh - 160px);
            display: flex;
            flex-direction: column;
        }

        .todo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 20px;
            letter-spacing: 0.02em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 14px;
            margin-bottom: 16px;
        }
        .todo-header .task-count {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-lo);
        }
        .todo-header .task-count span {
            color: var(--text-hi);
            font-weight: 600;
        }

        .todo-input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            flex-shrink: 0;
        }
        .todo-input-row input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
            font-family: inherit;
        }
        .todo-input-row input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }
        .todo-input-row input:focus {
            border-color: rgba(255, 255, 255, 0.4);
        }
        .todo-input-row .add-btn {
            padding: 12px 28px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            font-family: inherit;
        }
        .todo-input-row .add-btn:hover {
            background: rgba(255, 255, 255, 0.24);
        }
        .todo-input-row .add-btn:active {
            transform: scale(0.96);
        }

        .todo-list-container {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            padding-right: 4px;
        }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .todo-list li {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            transition: background 0.2s;
            font-size: 15px;
            word-break: break-word;
            animation: fadeIn 0.25s ease;
        }
        .todo-list li:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .todo-list li .checkbox {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .todo-list li .checkbox.checked {
            background: rgba(107, 203, 255, 0.3);
            border-color: #6bcbff;
        }
        .todo-list li .checkbox.checked::after {
            content: "✓";
            color: #6bcbff;
            font-size: 15px;
            font-weight: 700;
        }
        .todo-list li .checkbox:hover {
            border-color: rgba(255, 255, 255, 0.6);
        }

        .todo-list li .task-text {
            flex: 1;
            color: var(--text-hi);
            transition: opacity 0.2s;
            cursor: text;
            padding: 2px 4px;
            border-radius: 4px;
        }
        .todo-list li .task-text.done {
            opacity: 0.4;
            text-decoration: line-through;
        }
        .todo-list li .task-text.editing {
            background: rgba(255, 255, 255, 0.08);
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 6px;
        }

        .todo-list li .delete-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.25);
            cursor: pointer;
            font-size: 18px;
            padding: 0 4px;
            transition: color 0.2s;
            flex-shrink: 0;
            line-height: 1;
        }
        .todo-list li .delete-btn:hover {
            color: #ff6b6b;
        }

        .todo-empty {
            color: var(--text-lo);
            font-size: 15px;
            text-align: center;
            padding: 40px 0;
            opacity: 0.5;
        }

        /* ---- scrollbar ---- */
        .todo-list-container::-webkit-scrollbar {
            width: 4px;
        }
        .todo-list-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }
        .todo-list-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        /* ---- Background Toggle Button ---- */
        .bg-toggle-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text-hi);
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .bg-toggle-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.15);
        }
        .bg-toggle-btn:active {
            transform: scale(0.95);
        }

        /* ---- Background Popover ---- */
        .bg-popover {
            position: fixed;
            bottom: 100px;
            right: 30px;
            z-index: 9;
            width: 260px;
            padding: 20px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(28px) saturate(160%);
            -webkit-backdrop-filter: blur(28px) saturate(160%);
            border-radius: 20px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px) scale(0.95);
            transition: all 0.25s cubic-bezier(.4, 0, .2, 1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .bg-popover.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }

        .bg-popover .bg-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-lo);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 8px;
        }

        .bg-popover .thumb-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .bg-popover .bg-thumb {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.25s ease;
            opacity: 0.6;
            position: relative;
        }
        .bg-popover .bg-thumb:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }
        .bg-popover .bg-thumb.active {
            border-color: rgba(255, 255, 255, 0.85);
            opacity: 1;
        }

        .bg-popover .bg-thumb.upload-thumb,
        .bg-popover .bg-thumb.reset-thumb {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.5);
            border-style: dashed;
            border-width: 2px;
            cursor: pointer;
        }
        .bg-popover .bg-thumb.upload-thumb:hover,
        .bg-popover .bg-thumb.reset-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
        }
        .bg-popover .bg-thumb.upload-thumb input[type="file"] {
            display: none;
        }
        .bg-popover .bg-thumb.reset-thumb {
            border-style: solid;
            border-color: rgba(255, 100, 100, 0.2);
            color: rgba(255, 100, 100, 0.5);
        }
        .bg-popover .bg-thumb.reset-thumb:hover {
            border-color: rgba(255, 100, 100, 0.5);
            color: #ff6b6b;
        }

        /* ---- Home Button (bottom left) ---- */
        .home-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 10;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text-hi);
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            text-decoration: none;
        }
        .home-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.15);
        }
        .home-btn:active {
            transform: scale(0.95);
        }
        .home-btn svg {
            width: 26px;
            height: 26px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ---- responsive ---- */
        @media (max-width: 600px) {
            .todo-main {
                max-width: 100%;
                padding: 20px 18px 18px;
                border-radius: 20px;
                max-height: calc(100vh - 140px);
            }
            .todo-header {
                font-size: 17px;
                padding-bottom: 10px;
                margin-bottom: 12px;
            }
            .todo-input-row {
                gap: 8px;
                flex-wrap: wrap;
            }
            .todo-input-row input {
                font-size: 14px;
                padding: 10px 14px;
                flex: 1 1 100%;
            }
            .todo-input-row .add-btn {
                font-size: 14px;
                padding: 10px 20px;
                flex: 1;
                text-align: center;
            }
            .todo-list li {
                font-size: 14px;
                padding: 8px 12px;
                gap: 10px;
            }
            .todo-list li .checkbox {
                width: 20px;
                height: 20px;
            }
            .stage {
                padding-top: 80px;
                padding-left: 12px;
                padding-right: 12px;
            }
            .top-bar {
                top: 14px;
                left: 16px;
                right: 16px;
            }
            .logo {
                font-size: clamp(28px, 5vw, 42px);
            }
            .logo-sub {
                font-size: 0.3em;
                margin-top: -3px;
            }
            .bg-toggle-btn {
                bottom: 20px;
                right: 16px;
                width: 48px;
                height: 48px;
                font-size: 20px;
            }
            .home-btn {
                bottom: 20px;
                left: 16px;
                width: 48px;
                height: 48px;
            }
            .home-btn svg {
                width: 22px;
                height: 22px;
            }
            .bg-popover {
                bottom: 80px;
                right: 16px;
                width: 220px;
                padding: 16px;
            }
            .bg-popover .thumb-grid {
                gap: 8px;
            }
            .weather {
                font-size: 12px;
                min-height: 18px;
            }
            .clock {
                font-size: 12px;
            }
            .running-time {
                font-size: 12px;
            }
        }

        @media (max-width: 380px) {
            .todo-main {
                padding: 14px 12px 12px;
                border-radius: 16px;
            }
            .todo-input-row input {
                font-size: 13px;
                padding: 8px 12px;
            }
            .todo-input-row .add-btn {
                font-size: 13px;
                padding: 8px 14px;
            }
            .todo-list li {
                font-size: 13px;
                padding: 6px 10px;
            }
            .todo-list li .checkbox {
                width: 18px;
                height: 18px;
            }
            .bg-popover {
                width: 190px;
                padding: 12px;
                right: 12px;
                bottom: 70px;
            }
            .bg-popover .thumb-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
            }
            .home-btn {
                bottom: 16px;
                left: 12px;
                width: 42px;
                height: 42px;
            }
            .home-btn svg {
                width: 18px;
                height: 18px;
            }
            .bg-toggle-btn {
                bottom: 16px;
                right: 12px;
                width: 42px;
                height: 42px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- ---- background scenes ---- -->
    <div class="scene active" id="scene-rain" style="background-image:url('https://flocus.com/aesthetic-stopwatch/resources/images/themes/b075c800cadd3c9d930f.jpg');"></div>
    <div class="scene" id="scene-forest" style="background-image:url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1600&auto=format&fit=crop');"></div>
    <div class="scene" id="scene-ocean" style="background-image:url('https://images.unsplash.com/photo-1505228395891-9a51e7e86bf6?q=80&w=1600&auto=format&fit=crop');"></div>
    <div class="scene" id="scene-mountains" style="background-image:url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=1600&auto=format&fit=crop');"></div>
    <div class="scene" id="scene-night" style="background-image:url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=1600&auto=format&fit=crop');"></div>
    <div class="scene" id="scene-city" style="background-image:url('https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?q=80&w=1600&auto=format&fit=crop');"></div>
    <div class="scene" id="scene-sunset" style="background-image:url('https://images.unsplash.com/photo-1503803548695-c2a7b4a5b875?q=80&w=1600&auto=format&fit=crop');"></div>
    <div class="scene" id="scene-custom" style="background-image:none;"></div>

    <div class="scene-overlay"></div>
    <div class="vignette"></div>

    <!-- ---- top bar ---- -->
    <div class="top-bar">
        <div class="logo">
            TODO
            <span class="logo-sub">by pushpraj</span>
        </div>
        <div class="top-right">
            <div class="install-top">
                <button class="icon-btn hidden" id="installBtn" title="Install App">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </button>
            </div>

            <div class="info-row">
                <div class="weather" id="weatherDisplay">⛅ <span class="temp">--°</span></div>
            </div>

            <div class="clock" id="clock">--:--</div>
            <div class="running-time" id="runningTime">--:--:--</div>
        </div>
    </div>

    <!-- ---- stage ---- -->
    <div class="stage">
        <div class="todo-main">
            <div class="todo-header">
                <span>📋 Tasks</span>
                <span class="task-count"><span id="taskCount">0</span> tasks</span>
            </div>

            <div class="todo-input-row">
                <input type="text" id="todoInput" placeholder="Add a task…" autofocus />
                <button class="add-btn" id="addTodoBtn">Add</button>
            </div>

            <div class="todo-list-container">
                <ul class="todo-list" id="todoList">
                    <li class="todo-empty">✨ No tasks yet. Add one above!</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- ---- Home Button (bottom left) ---- -->
    <a href="index.html" class="home-btn" title="Home">
        <svg viewBox="0 0 24 24">
            <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
    </a>

    <!-- ---- Background Toggle Button ---- -->
    <button class="bg-toggle-btn" id="bgToggleBtn" title="Change background">
        🎨
    </button>

    <!-- ---- Background Popover ---- -->
    <div class="bg-popover" id="bgPopover">
        <div class="bg-label">Choose Background</div>
        <div class="thumb-grid">
            <div class="bg-thumb active" data-scene="scene-rain" style="background-image:url('https://flocus.com/aesthetic-stopwatch/resources/images/themes/b075c800cadd3c9d930f.jpg');" title="Rain"></div>
            <div class="bg-thumb" data-scene="scene-forest" style="background-image:url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=200&auto=format&fit=crop');" title="Forest"></div>
            <div class="bg-thumb" data-scene="scene-ocean" style="background-image:url('https://images.unsplash.com/photo-1505228395891-9a51e7e86bf6?q=80&w=200&auto=format&fit=crop');" title="Ocean"></div>
            <div class="bg-thumb" data-scene="scene-mountains" style="background-image:url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=200&auto=format&fit=crop');" title="Mountains"></div>
            <div class="bg-thumb" data-scene="scene-night" style="background-image:url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=200&auto=format&fit=crop');" title="Night"></div>
            <div class="bg-thumb" data-scene="scene-city" style="background-image:url('https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?q=80&w=200&auto=format&fit=crop');" title="City"></div>
            <div class="bg-thumb" data-scene="scene-sunset" style="background-image:url('https://images.unsplash.com/photo-1503803548695-c2a7b4a5b875?q=80&w=200&auto=format&fit=crop');" title="Sunset"></div>
            <div class="bg-thumb upload-thumb" id="uploadThumb" title="Upload photo">
                <input type="file" id="bgFileInput" accept="image/*" />
                <span>📁</span>
            </div>
            <div class="bg-thumb reset-thumb" id="resetBgBtn" title="Reset to default">
                <span>✕</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ---- DOM refs ----
            const todoInput = document.getElementById('todoInput');
            const addTodoBtn = document.getElementById('addTodoBtn');
            const todoList = document.getElementById('todoList');
            const taskCount = document.getElementById('taskCount');
            const clockEl = document.getElementById('clock');
            const runningTimeEl = document.getElementById('runningTime');
            const weatherDisplay = document.getElementById('weatherDisplay');
            const installBtn = document.getElementById('installBtn');

            // Background
            const bgToggleBtn = document.getElementById('bgToggleBtn');
            const bgPopover = document.getElementById('bgPopover');
            const bgThumbs = bgPopover.querySelectorAll('.bg-thumb[data-scene]');
            const uploadThumb = document.getElementById('uploadThumb');
            const bgFileInput = document.getElementById('bgFileInput');
            const resetBgBtn = document.getElementById('resetBgBtn');
            const sceneCustom = document.getElementById('scene-custom');
            const allScenes = document.querySelectorAll('.scene');

            // ---- Install ----
            let deferredPrompt = null;
            let isAppInstalled = false;

            if (window.matchMedia('(display-mode: standalone)').matches) {
                isAppInstalled = true;
                installBtn.classList.remove('visible');
                installBtn.classList.add('hidden');
            }

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                if (!isAppInstalled) {
                    installBtn.classList.remove('hidden');
                    installBtn.classList.add('visible');
                }
            });

            window.addEventListener('appinstalled', () => {
                isAppInstalled = true;
                installBtn.classList.remove('visible');
                installBtn.classList.add('hidden');
                deferredPrompt = null;
            });

            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    try {
                        const result = await deferredPrompt.prompt();
                        if (result.outcome === 'accepted') {
                            isAppInstalled = true;
                            installBtn.classList.add('hidden');
                            installBtn.classList.remove('visible');
                        }
                    } catch (_) {
                        if (navigator.share) {
                            try {
                                await navigator.share({
                                    title: 'TODO List',
                                    text: 'Check out this simple todo list app!',
                                    url: window.location.href
                                });
                            } catch (_2) {}
                        }
                    }
                } else {
                    if (navigator.share) {
                        try {
                            await navigator.share({
                                title: 'TODO List',
                                text: 'Check out this simple todo list app!',
                                url: window.location.href
                            });
                        } catch (_) {}
                    }
                }
            });

            if (window.matchMedia('(display-mode: standalone)').matches) {
                installBtn.classList.add('hidden');
                installBtn.classList.remove('visible');
            }

            // ---- Todo data ----
            let todos = [];

            function loadTodos() {
                try {
                    const data = localStorage.getItem('todos');
                    todos = data ? JSON.parse(data) : [];
                } catch (_) { todos = []; }
                renderTodos();
            }

            function saveTodos() {
                try {
                    localStorage.setItem('todos', JSON.stringify(todos));
                } catch (_) {}
                updateTaskCount();
            }

            function updateTaskCount() {
                const active = todos.filter(t => !t.completed).length;
                taskCount.textContent = active;
            }

            function addTodo() {
                const text = todoInput.value.trim();
                if (!text) return;
                todos.push({
                    id: Date.now() + Math.random(),
                    text: text,
                    completed: false,
                    createdAt: new Date().toISOString()
                });
                todoInput.value = '';
                saveTodos();
                renderTodos();
                todoInput.focus();
            }

            function toggleTodo(id) {
                const todo = todos.find(t => t.id === id);
                if (todo) {
                    todo.completed = !todo.completed;
                    saveTodos();
                    renderTodos();
                }
            }

            function deleteTodo(id) {
                todos = todos.filter(t => t.id !== id);
                saveTodos();
                renderTodos();
            }

            function editTodo(id, newText) {
                const todo = todos.find(t => t.id === id);
                if (todo) {
                    todo.text = newText.trim() || todo.text;
                    saveTodos();
                    renderTodos();
                }
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function renderTodos() {
                if (todos.length === 0) {
                    todoList.innerHTML = '<li class="todo-empty">✨ No tasks yet. Add one above!</li>';
                    updateTaskCount();
                    return;
                }

                const sorted = [...todos].sort((a, b) => {
                    if (a.completed !== b.completed) return a.completed ? 1 : -1;
                    return a.createdAt.localeCompare(b.createdAt);
                });

                let html = '';
                sorted.forEach(todo => {
                    const checked = todo.completed ? 'checked' : '';
                    const doneClass = todo.completed ? 'done' : '';
                    html += `
                            <li>
                                <div class="checkbox ${checked}" data-id="${todo.id}"></div>
                                <span class="task-text ${doneClass}" data-id="${todo.id}">${escapeHtml(todo.text)}</span>
                                <button class="delete-btn" data-id="${todo.id}">✕</button>
                            </li>
                        `;
                });
                todoList.innerHTML = html;

                todoList.querySelectorAll('.checkbox').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = parseFloat(el.dataset.id);
                        toggleTodo(id);
                    });
                });

                todoList.querySelectorAll('.delete-btn').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = parseFloat(el.dataset.id);
                        deleteTodo(id);
                    });
                });

                todoList.querySelectorAll('.task-text').forEach(el => {
                    el.addEventListener('dblclick', (e) => {
                        e.stopPropagation();
                        const id = parseFloat(el.dataset.id);
                        const currentText = el.textContent;
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.value = currentText;
                        input.className = 'task-text editing';
                        input.dataset.id = id;
                        el.replaceWith(input);
                        input.focus();
                        input.select();

                        const finishEdit = () => {
                            const newText = input.value.trim() || currentText;
                            const parent = input.parentNode;
                            const newSpan = document.createElement('span');
                            newSpan.className = 'task-text';
                            newSpan.dataset.id = id;
                            newSpan.textContent = newText;
                            input.replaceWith(newSpan);
                            editTodo(id, newText);
                            newSpan.addEventListener('dblclick', (e2) => {
                                e2.stopPropagation();
                                const id2 = parseFloat(newSpan.dataset.id);
                                const currentText2 = newSpan.textContent;
                                const input2 = document.createElement('input');
                                input2.type = 'text';
                                input2.value = currentText2;
                                input2.className = 'task-text editing';
                                input2.dataset.id = id2;
                                newSpan.replaceWith(input2);
                                input2.focus();
                                input2.select();
                                const finishEdit2 = () => {
                                    const newText2 = input2.value.trim() || currentText2;
                                    const parent2 = input2.parentNode;
                                    const newSpan2 = document.createElement('span');
                                    newSpan2.className = 'task-text';
                                    newSpan2.dataset.id = id2;
                                    newSpan2.textContent = newText2;
                                    input2.replaceWith(newSpan2);
                                    editTodo(id2, newText2);
                                    newSpan2.addEventListener('dblclick', arguments
                                    .callee);
                                };
                                input2.addEventListener('blur', finishEdit2);
                                input2.addEventListener('keydown', (e3) => {
                                    if (e3.key === 'Enter') {
                                        e3.preventDefault();
                                        input2.blur();
                                    }
                                    if (e3.key === 'Escape') {
                                        input2.value = currentText2;
                                        input2.blur();
                                    }
                                });
                            });
                        };

                        input.addEventListener('blur', finishEdit);
                        input.addEventListener('keydown', (e2) => {
                            if (e2.key === 'Enter') {
                                e2.preventDefault();
                                input.blur();
                            }
                            if (e2.key === 'Escape') {
                                input.value = currentText;
                                input.blur();
                            }
                        });
                    });
                });

                updateTaskCount();
            }

            // ---- clock ----
            function updateClock() {
                const now = new Date();
                const dateOptions = { month: 'short', day: '2-digit', year: 'numeric' };
                const dateStr = now.toLocaleString('en-US', dateOptions);
                clockEl.textContent = dateStr;
                const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
                const timeStr = now.toLocaleString('en-US', timeOptions);
                runningTimeEl.textContent = timeStr;
            }
            updateClock();
            setInterval(updateClock, 1000);

            // ---- weather ----
            async function fetchWeather() {
                try {
                    const pos = await new Promise((resolve, reject) => {
                        if (!navigator.geolocation) reject('Geolocation not supported');
                        navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000 });
                    });
                    const { latitude, longitude } = pos.coords;
                    const url =
                        `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&timezone=auto`;
                    const resp = await fetch(url);
                    const data = await resp.json();
                    if (data.current_weather) {
                        const temp = Math.round(data.current_weather.temperature);
                        let tempStr = temp.toString();
                        if (tempStr.startsWith('+')) tempStr = tempStr.substring(1);
                        weatherDisplay.innerHTML = `⛅ <span class="temp">${tempStr}°</span>`;
                    }
                } catch (_) {
                    try {
                        const resp = await fetch('https://wttr.in/?format=%t&lang=en');
                        const text = await resp.text();
                        const match = text.match(/([+-]?\d+°C)/);
                        if (match) {
                            const tempNum = parseFloat(match[1]);
                            weatherDisplay.innerHTML = `⛅ <span class="temp">${tempNum}°</span>`;
                        } else {
                            throw new Error('No temp');
                        }
                    } catch (_2) {
                        weatherDisplay.innerHTML = `⛅ <span class="temp">--°</span>`;
                    }
                }
            }
            fetchWeather();
            setInterval(fetchWeather, 600000);

            // ---- Background management ----
            let currentScene = 'scene-rain';
            let customBgData = null;

            function activateScene(sceneId) {
                // Hide all scenes
                allScenes.forEach(s => s.classList.remove('active'));

                // Show target
                const target = document.getElementById(sceneId);
                if (target) {
                    target.classList.add('active');
                    target.style.display = '';
                }

                // Update thumbs inside popover
                bgThumbs.forEach(t => t.classList.remove('active'));
                const thumb = bgPopover.querySelector(`.bg-thumb[data-scene="${sceneId}"]`);
                if (thumb) thumb.classList.add('active');

                // Update upload thumb state
                if (sceneId === 'scene-custom') {
                    uploadThumb.classList.add('active');
                } else {
                    uploadThumb.classList.remove('active');
                }

                currentScene = sceneId;

                // Save preference
                try {
                    localStorage.setItem('bgScene', sceneId);
                    if (sceneId === 'scene-custom' && customBgData) {
                        localStorage.setItem('customBg', customBgData);
                    } else {
                        localStorage.removeItem('customBg');
                    }
                } catch (_) {}
            }

            function setCustomBackground(dataUrl) {
                customBgData = dataUrl;
                sceneCustom.style.backgroundImage = `url('${dataUrl}')`;
                sceneCustom.style.display = '';
                activateScene('scene-custom');
                // Close popover after selection
                closePopover();
            }

            function resetToDefault() {
                customBgData = null;
                sceneCustom.style.display = 'none';
                sceneCustom.style.backgroundImage = '';
                activateScene('scene-rain');
                try {
                    localStorage.removeItem('customBg');
                } catch (_) {}
                closePopover();
            }

            function loadSavedBackground() {
                try {
                    const saved = localStorage.getItem('bgScene');
                    const custom = localStorage.getItem('customBg');
                    if (saved === 'scene-custom' && custom) {
                        customBgData = custom;
                        sceneCustom.style.backgroundImage = `url('${custom}')`;
                        sceneCustom.style.display = '';
                        activateScene('scene-custom');
                        return true;
                    } else if (saved && document.getElementById(saved)) {
                        activateScene(saved);
                        return true;
                    }
                } catch (_) {}
                return false;
            }

            // ---- Popover toggle ----
            function togglePopover() {
                const isOpen = bgPopover.classList.toggle('open');
                if (isOpen) {
                    // Ensure thumbs reflect current state
                    bgThumbs.forEach(t => t.classList.remove('active'));
                    const thumb = bgPopover.querySelector(`.bg-thumb[data-scene="${currentScene}"]`);
                    if (thumb) thumb.classList.add('active');
                    if (currentScene === 'scene-custom') {
                        uploadThumb.classList.add('active');
                    } else {
                        uploadThumb.classList.remove('active');
                    }
                }
            }

            function closePopover() {
                bgPopover.classList.remove('open');
            }

            bgToggleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                togglePopover();
            });

            document.addEventListener('click', (e) => {
                if (bgPopover.classList.contains('open')) {
                    // If click is outside popover and not on the toggle button
                    if (!bgPopover.contains(e.target) && e.target !== bgToggleBtn) {
                        closePopover();
                    }
                }
            });

            // ---- Background event listeners (inside popover) ----
            bgThumbs.forEach(thumb => {
                thumb.addEventListener('click', () => {
                    const sceneId = thumb.dataset.scene;
                    if (sceneId) {
                        if (currentScene === 'scene-custom') {
                            customBgData = null;
                            sceneCustom.style.display = 'none';
                            sceneCustom.style.backgroundImage = '';
                            try { localStorage.removeItem('customBg'); } catch (_) {}
                        }
                        activateScene(sceneId);
                        closePopover();
                    }
                });
            });

            uploadThumb.addEventListener('click', (e) => {
                e.stopPropagation();
                // If custom is active, clicking upload resets to default
                if (currentScene === 'scene-custom') {
                    if (confirm('Reset to default background?')) {
                        resetToDefault();
                    }
                    return;
                }
                // Otherwise, trigger file input
                bgFileInput.click();
            });

            bgFileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    alert('Please select an image file.');
                    bgFileInput.value = '';
                    return;
                }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    setCustomBackground(ev.target.result);
                    bgFileInput.value = '';
                };
                reader.onerror = () => {
                    alert('Error reading file.');
                    bgFileInput.value = '';
                };
                reader.readAsDataURL(file);
            });

            resetBgBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentScene === 'scene-rain') {
                    closePopover();
                    return;
                }
                resetToDefault();
            });

            // ---- keyboard shortcuts ----
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') {
                    if (e.key === 'Enter' && e.target.id === 'todoInput') {
                        e.preventDefault();
                        addTodo();
                    }
                    return;
                }
                if (e.key === 'n' || e.key === 'N') {
                    e.preventDefault();
                    todoInput.focus();
                }
                if (e.key === 'Escape') {
                    closePopover();
                }
            });

            // ---- init ----
            loadTodos();
            todoInput.focus();

            if (!loadSavedBackground()) {
                activateScene('scene-rain');
            }

            addTodoBtn.addEventListener('click', addTodo);

            console.log('📋 TODO List · Type a task and press Enter · N to focus input');
            console.log('🎨 Click the palette button to change the background');

        })();
    </script>

</body>
