<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Full History · FOCUS</title>

    <style>
        :root {
            --text-hi: rgba(255, 255, 255, 0.96);
            --text-lo: rgba(255, 255, 255, 0.65);
            --glass: rgba(255, 255, 255, 0.10);
            --glass-border: rgba(255, 255, 255, 0.22);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', "SF Pro Display", "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #0a0c10 0%, #10141c 45%, #0a0c10 100%);
            color: var(--text-hi);
        }

        .page {
            max-width: 640px;
            margin: 0 auto;
            padding: 24px 18px 60px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 22px;
        }

        .back-btn {
            width: 42px;
            height: 42px;
            flex-shrink: 0;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text-hi);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .back-btn:hover { background: rgba(255,255,255,0.18); }
        .back-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        h1 {
            font-size: clamp(20px, 3vw, 26px);
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.01em;
        }

        .subtitle {
            color: var(--text-lo);
            font-size: 13px;
            margin-top: 2px;
        }

        .overall-stats {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .overall-stats .stat-card {
            flex: 1;
            min-width: 130px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px 16px;
        }
        .overall-stats .stat-card .label {
            font-size: 11px;
            color: var(--text-lo);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .overall-stats .stat-card .value {
            font-size: 20px;
            font-weight: 700;
            margin-top: 4px;
        }

        .day-group {
            margin-bottom: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 16px;
            overflow: hidden;
        }
        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            cursor: pointer;
            user-select: none;
        }
        .day-header .day-name {
            font-weight: 600;
            font-size: 14.5px;
        }
        .day-header .day-total {
            font-size: 13px;
            color: var(--text-lo);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .day-header .chevron {
            transition: transform 0.25s ease;
            font-size: 11px;
            color: var(--text-lo);
        }
        .day-group.collapsed .chevron { transform: rotate(-90deg); }

        .day-sessions {
            list-style: none;
            margin: 0;
            padding: 0 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .day-group.collapsed .day-sessions { display: none; }

        .day-sessions li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            font-size: 12.5px;
            color: var(--text-lo);
        }
        .day-sessions li .session-time { font-weight: 500; color: var(--text-hi); }
        .day-sessions li .session-duration { font-weight: 500; color: var(--text-hi); }
        .day-sessions li .session-mode {
            font-size: 10px;
            background: rgba(255, 255, 255, 0.06);
            padding: 2px 10px;
            border-radius: 100px;
        }
        .day-sessions li .session-mode.stopwatch { color: #6bcbff; }
        .day-sessions li .session-mode.timer { color: #ffd93d; }

        .empty-state {
            text-align: center;
            color: var(--text-lo);
            padding: 60px 20px;
            font-size: 14px;
        }

        .day-sessions::-webkit-scrollbar { width: 6px; }
        .day-sessions::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="page">
        <div class="top-bar">
            <a href="timer.html" class="back-btn" title="Back to timer">
                <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            </a>
            <div>
                <h1>Full Session History</h1>
                <div class="subtitle">Every focus session, grouped by day</div>
            </div>
        </div>

        <div class="overall-stats" id="overallStats"></div>

        <div id="historyContainer"></div>
    </div>

    <script>
        function loadSessions() {
            try {
                const data = localStorage.getItem('focusSessions');
                return data ? JSON.parse(data) : [];
            } catch (_) {
                return [];
            }
        }

        function formatDuration(ms) {
            const totalSec = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSec / 60);
            const seconds = totalSec % 60;
            if (minutes >= 60) {
                const hours = Math.floor(minutes / 60);
                const mins = minutes % 60;
                return `${hours}h ${mins}m`;
            }
            if (minutes > 0) return `${minutes}m ${seconds}s`;
            return `${seconds}s`;
        }

        function groupByDay(sessions) {
            const groups = {};
            sessions.forEach(s => {
                if (!groups[s.date]) groups[s.date] = [];
                groups[s.date].push(s);
            });
            return Object.keys(groups)
                .sort((a, b) => b.localeCompare(a))
                .map(date => ({
                    date,
                    sessions: groups[date].sort((a, b) => b.timestamp - a.timestamp)
                }));
        }

        function dayLabel(dateKey) {
            const today = new Date().toISOString().split('T')[0];
            const yestDate = new Date();
            yestDate.setDate(yestDate.getDate() - 1);
            const yesterday = yestDate.toISOString().split('T')[0];
            if (dateKey === today) return 'Today';
            if (dateKey === yesterday) return 'Yesterday';
            const dateObj = new Date(dateKey + 'T00:00:00');
            return dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        function render() {
            const sessions = loadSessions();
            const overallStats = document.getElementById('overallStats');
            const container = document.getElementById('historyContainer');

            if (sessions.length === 0) {
                overallStats.innerHTML = '';
                container.innerHTML = '<div class="empty-state">No sessions recorded yet.<br>Start a focus session to see your history here.</div>';
                return;
            }

            const totalAllTime = sessions.reduce((sum, s) => sum + s.durationMs, 0);
            const dayGroups = groupByDay(sessions);

            overallStats.innerHTML = `
                <div class="stat-card">
                    <div class="label">Total sessions</div>
                    <div class="value">${sessions.length}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Total time</div>
                    <div class="value">${formatDuration(totalAllTime)}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Days tracked</div>
                    <div class="value">${dayGroups.length}</div>
                </div>
            `;

            let html = '';
            dayGroups.forEach(group => {
                const dayTotal = group.sessions.reduce((sum, s) => sum + s.durationMs, 0);
                let sessionsHtml = '';
                group.sessions.forEach(s => {
                    const timeStr = new Date(s.timestamp).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                    const modeClass = s.mode === 'stopwatch' ? 'stopwatch' : 'timer';
                    const modeLabel = s.mode === 'stopwatch' ? '⏱️' : '⏲️';
                    sessionsHtml += `
                        <li>
                            <span class="session-time">${timeStr}</span>
                            <span class="session-duration">${formatDuration(s.durationMs)}</span>
                            <span class="session-mode ${modeClass}">${modeLabel} ${s.mode}</span>
                        </li>
                    `;
                });
                html += `
                    <div class="day-group">
                        <div class="day-header">
                            <span class="day-name">${dayLabel(group.date)}</span>
                            <span class="day-total">${group.sessions.length} sessions <span class="chevron">▼</span> · ${formatDuration(dayTotal)}</span>
                        </div>
                        <ul class="day-sessions">${sessionsHtml}</ul>
                    </div>
                `;
            });
            container.innerHTML = html;

            container.querySelectorAll('.day-header').forEach(header => {
                header.addEventListener('click', () => {
                    header.closest('.day-group').classList.toggle('collapsed');
                });
            });
        }

        render();
    </script>
</body>
</html>
