<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>History · FOCUS</title>

    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <link rel="manifest" id="manifestLink" />
    <script>
        (function() {
            const manifest = {
                name: "FOCUS",
                short_name: "FOCUS",
                description: "Focus timer with scenic backgrounds and session tracking.",
                start_url: new URL('.', document.baseURI).href,
                display: "standalone",
                background_color: "#0a0c10",
                theme_color: "#0a0c10",
                icons: [
                    { src: new URL('logo.png', document.baseURI).href, sizes: "192x192", type: "image/png" },
                    { src: new URL('logo.png', document.baseURI).href, sizes: "512x512", type: "image/png" }
                ]
            };
            const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            document.getElementById('manifestLink').href = url;
        })();
    </script>

    <style>
        :root {
            --text-hi: rgba(255, 255, 255, 0.96);
            --text-lo: rgba(255, 255, 255, 0.65);
            --glass: rgba(255, 255, 255, 0.10);
            --glass-border: rgba(255, 255, 255, 0.22);
            --accent-blue: #6bcbff;
            --accent-gold: #ffd93d;
            --bar-gradient: linear-gradient(180deg, #6bcbff 0%, #4a9ed6 100%);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', "SF Pro Display", "Segoe UI", sans-serif;
        }

        body {
            position: relative;
        }

        /* ---- Fixed Nature Background ---- */
        .bg-scene {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-image: url('https://static.vecteezy.com/system/resources/thumbnails/049/855/347/small/nature-background-high-resolution-wallpaper-for-a-serene-and-stunning-view-photo.jpg');
            z-index: -3;
        }

        .scene-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg,
                    rgba(10, 12, 16, 0.30) 0%,
                    rgba(10, 12, 16, 0.10) 40%,
                    rgba(10, 12, 16, 0.25) 70%,
                    rgba(10, 12, 16, 0.50) 100%);
            z-index: -2;
            pointer-events: none;
        }

        .vignette {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            box-shadow: inset 0 0 180px rgba(0, 0, 0, 0.45);
        }

        /* ---- top bar ---- */
        .top-bar {
            position: fixed;
            top: 20px;
            left: 26px;
            right: 26px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 5;
            color: var(--text-hi);
        }

        .left-group {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .back-btn {
            width: 42px;
            height: 42px;
            flex-shrink: 0;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            color: var(--text-hi);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(.4, 0, .2, 1);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.16);
            transform: scale(1.05);
        }
        .back-btn:active {
            transform: scale(0.94);
        }
        .back-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .logo {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: clamp(36px, 6vw, 76px);
            font-weight: 700;
            letter-spacing: 0.02em;
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
            line-height: 1.1;
        }
        .logo-sub {
            font-weight: 400;
            font-size: 0.32em;
            opacity: 0.8;
            letter-spacing: 0.15em;
            margin-top: -4px;
            text-transform: lowercase;
        }

        .top-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            line-height: 1.4;
        }

        .install-top {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 2px;
        }
        .install-top .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 14px;
            padding: 0;
        }
        .install-top .icon-btn.visible {
            display: flex;
        }
        .install-top .icon-btn:hover {
            background: rgba(255, 255, 255, 0.16);
            color: #6bcbff;
            border-color: rgba(107, 203, 255, 0.3);
        }
        .install-top .icon-btn svg {
            width: 16px;
            height: 16px;
        }

        .info-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .weather {
            font-size: clamp(13px, 1.2vw, 16px);
            font-weight: 500;
            color: var(--text-lo);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.02em;
            opacity: 0.9;
            min-height: 22px;
        }
        .weather .temp {
            font-weight: 600;
            color: var(--text-hi);
        }

        .clock {
            font-size: clamp(13px, 1.1vw, 16px);
            font-weight: 500;
            color: var(--text-lo);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            font-variant-numeric: tabular-nums;
        }
        .running-time {
            font-size: clamp(13px, 1.1vw, 16px);
            font-weight: 500;
            color: var(--text-lo);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            font-variant-numeric: tabular-nums;
        }

        /* ---- stage ---- */
        .stage {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            padding-top: 110px;
            overflow-y: auto;
        }

        /* ---- glass card containers ---- */
        .glass-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(28px) saturate(160%);
            -webkit-backdrop-filter: blur(28px) saturate(160%);
            border-radius: 28px;
            padding: 24px 28px;
            box-shadow: 0 24px 60px -24px rgba(0, 0, 0, 0.6);
            color: var(--text-hi);
            width: 100%;
            max-width: 700px;
        }

        /* ---- today hero ---- */
        .today-hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .today-hero .label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-lo);
            letter-spacing: 0.04em;
        }
        .today-hero .time {
            font-size: clamp(28px, 4.5vw, 42px);
            font-weight: 700;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, #6bcbff 0%, #ffd93d 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .today-hero .sessions-count {
            font-size: 12px;
            color: var(--text-lo);
            margin-top: 2px;
        }
        .today-hero .right {
            text-align: right;
        }

        /* ---- overall stats ---- */
        .overall-stats {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 700px;
        }
        .overall-stats .stat-card {
            flex: 1;
            min-width: 90px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 12px 14px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }
        .overall-stats .stat-card .label {
            font-size: 10px;
            color: var(--text-lo);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
        }
        .overall-stats .stat-card .value {
            font-size: 18px;
            font-weight: 700;
            margin-top: 3px;
        }

        /* ---- section tabs ---- */
        .section-tabs {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 16px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 700px;
        }
        .section-tabs .tab-btn {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-lo);
            font-size: 13px;
            font-weight: 600;
            padding: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(.4,0,.2,1);
            font-family: inherit;
            letter-spacing: 0.03em;
        }
        .section-tabs .tab-btn.active {
            background: rgba(255, 255, 255, 0.14);
            color: var(--text-hi);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .section-tabs .tab-btn:hover:not(.active) {
            color: rgba(255,255,255,0.8);
        }

        /* ---- sections ---- */
        .section {
            display: none;
            animation: fadeSlide 0.3s ease;
            width: 100%;
            max-width: 700px;
        }
        .section.active {
            display: block;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ---- chart section ---- */
        .chart-section-wrap {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 18px 12px 14px;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            padding: 0 6px;
        }
        .chart-header .chart-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-lo);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .chart-header .chart-pagination {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-header .chart-pagination .page-info {
            font-size: 11px;
            color: var(--text-lo);
            min-width: 44px;
            text-align: center;
        }
        .chart-header .chart-pagination .arrow-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: var(--text-lo);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            font-size: 14px;
            user-select: none;
        }
        .chart-header .chart-pagination .arrow-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.14);
            color: var(--text-hi);
        }
        .chart-header .chart-pagination .arrow-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }
        .chart-header .chart-pagination .arrow-btn:active:not(:disabled) {
            transform: scale(0.92);
        }

        .chart-range-label {
            text-align: center;
            font-size: 11px;
            color: var(--text-lo);
            opacity: 0.7;
            margin-bottom: 14px;
            letter-spacing: 0.02em;
        }

        .chart-avg-line {
            position: absolute;
            left: 0;
            right: 0;
            border-top: 1.5px dashed rgba(255, 217, 61, 0.35);
            pointer-events: none;
            z-index: 1;
        }
        .chart-avg-tag {
            position: absolute;
            right: 2px;
            top: -8px;
            font-size: 8.5px;
            font-weight: 600;
            color: rgba(255, 217, 61, 0.75);
            background: rgba(10,12,16,0.55);
            padding: 1px 6px;
            border-radius: 100px;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        .chart-bars {
            position: relative;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 180px;
            padding: 0 4px;
            gap: 8px;
            touch-action: pan-x;
            overflow-x: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .chart-bars::-webkit-scrollbar { display: none; }

        .chart-bar-wrapper {
            position: relative;
            flex: 0 0 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            height: 100%;
            justify-content: flex-end;
            min-width: 36px;
            z-index: 2;
        }
        .chart-bar-track {
            width: 100%;
            max-width: 44px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border-radius: 6px 6px 0 0;
            background: rgba(255,255,255,0.04);
            cursor: pointer;
            position: relative;
        }
        .chart-bar {
            width: 100%;
            border-radius: 6px 6px 0 0;
            min-height: 4px;
            background: var(--bar-gradient);
            transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1), filter 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 0 20px rgba(107,203,255,0.12);
        }
        .chart-bar-track:hover .chart-bar {
            filter: brightness(1.18);
            box-shadow: 0 0 26px rgba(107,203,255,0.3);
        }
        .chart-bar.today {
            background: linear-gradient(180deg, #ffd93d 0%, #f5a623 100%);
            box-shadow: 0 0 24px rgba(255,215,0,0.25);
        }
        .chart-bar-track:hover .chart-bar.today {
            box-shadow: 0 0 30px rgba(255,215,0,0.4);
        }
        .chart-bar.empty-day {
            background: rgba(255,255,255,0.06);
            box-shadow: none;
        }
        .chart-bar-value {
            font-size: 8px;
            color: var(--text-lo);
            font-weight: 600;
            text-align: center;
            margin-bottom: 2px;
            opacity: 0.75;
            white-space: nowrap;
        }
        .chart-bar-value.today-value {
            color: var(--accent-gold);
            opacity: 1;
        }
        .chart-bar-day {
            font-size: 9px;
            font-weight: 600;
            color: var(--text-lo);
            letter-spacing: 0.02em;
            text-align: center;
            margin-top: 2px;
            white-space: nowrap;
        }
        .chart-bar-day.today-label {
            color: var(--accent-gold);
        }

        .chart-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-8px) scale(0.9);
            background: rgba(15, 16, 22, 0.95);
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 10px;
            padding: 6px 10px;
            font-size: 10.5px;
            font-weight: 600;
            color: var(--text-hi);
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.18s ease, transform 0.18s ease;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            z-index: 10;
        }
        .chart-bar-track:hover .chart-tooltip,
        .chart-bar-track:active .chart-tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(-12px) scale(1);
        }
        .chart-tooltip .tt-sessions {
            display: block;
            font-weight: 400;
            color: var(--text-lo);
            font-size: 9.5px;
            margin-top: 1px;
        }

        .chart-empty {
            text-align: center;
            color: var(--text-lo);
            padding: 30px 10px;
            font-size: 13px;
        }
        .chart-empty .icon {
            font-size: 28px;
            display: block;
            margin-bottom: 8px;
            opacity: 0.4;
        }

        .chart-view-toggle {
            display: flex;
            gap: 4px;
            margin-bottom: 14px;
        }
        .chart-view-toggle .view-btn {
            flex: 1;
            border: none;
            background: rgba(255,255,255,0.05);
            color: var(--text-lo);
            font-size: 11.5px;
            font-weight: 600;
            padding: 7px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            letter-spacing: 0.02em;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .chart-view-toggle .view-btn.active {
            background: rgba(107,203,255,0.14);
            color: var(--accent-blue);
            border-color: rgba(107,203,255,0.3);
        }

        /* ---- list section ---- */
        .day-group {
            margin-bottom: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.2s;
        }
        .day-group:hover {
            border-color: rgba(255,255,255,0.20);
        }
        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .day-header:hover {
            background: rgba(255,255,255,0.04);
        }
        .day-header .day-name {
            font-weight: 600;
            font-size: 14.5px;
            letter-spacing: 0.01em;
        }
        .day-header .day-total {
            font-size: 12.5px;
            color: var(--text-lo);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .day-header .day-total .count-badge {
            background: rgba(255,255,255,0.08);
            padding: 2px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 500;
        }
        .day-header .chevron {
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
            font-size: 10px;
            color: var(--text-lo);
            margin-left: 4px;
        }
        .day-group.collapsed .chevron {
            transform: rotate(-90deg);
        }
        .day-sessions {
            list-style: none;
            margin: 0;
            padding: 0 14px 14px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .day-group.collapsed .day-sessions {
            display: none;
        }
        .day-sessions li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            font-size: 12.5px;
            color: var(--text-lo);
            transition: background 0.2s;
        }
        .day-sessions li:hover {
            background: rgba(255,255,255,0.06);
        }
        .day-sessions li .session-time {
            font-weight: 500;
            color: var(--text-hi);
            font-variant-numeric: tabular-nums;
        }
        .day-sessions li .session-duration {
            font-weight: 500;
            color: var(--text-hi);
            font-variant-numeric: tabular-nums;
        }
        .day-sessions li .session-mode {
            font-size: 9.5px;
            font-weight: 600;
            background: rgba(255,255,255,0.06);
            padding: 2px 12px;
            border-radius: 100px;
            letter-spacing: 0.03em;
        }
        .day-sessions li .session-mode.stopwatch {
            color: var(--accent-blue);
            background: rgba(107,203,255,0.10);
        }
        .day-sessions li .session-mode.timer {
            color: var(--accent-gold);
            background: rgba(255,215,0,0.10);
        }
        .list-empty {
            text-align: center;
            color: var(--text-lo);
            padding: 40px 20px;
            font-size: 14px;
        }
        .list-empty .icon {
            font-size: 32px;
            display: block;
            margin-bottom: 10px;
            opacity: 0.4;
        }

        /* ---- floating timer badge ---- */
        #bgTimerBadge {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(20,20,30,0.82);
            border: 1px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            border-radius: 40px;
            padding: 8px 18px 8px 14px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            color: rgba(255,255,255,0.92);
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.02em;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.45s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
            user-select: none;
        }
        #bgTimerBadge.visible {
            transform: translateX(-50%) translateY(0);
        }
        #bgTimerBadge:hover {
            box-shadow: 0 12px 40px rgba(0,0,0,0.55);
        }
        #bgTimerBadge .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #5ef08a;
            box-shadow: 0 0 8px #5ef08a;
            flex-shrink: 0;
            animation: badgePulse 1.4s ease-in-out infinite;
        }
        @keyframes badgePulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.55; transform: scale(0.8); }
        }
        #bgTimerBadge .badge-label { opacity: 0.65; margin-right: 2px; }
        #bgTimerBadge .badge-time  { font-variant-numeric: tabular-nums; font-weight: 600; }
        #bgTimerBadge .badge-goto  { opacity: 0.55; font-size: 11px; margin-left: 4px; }

        @media (max-width: 380px) {
            .glass-card {
                padding: 12px 12px;
                border-radius: 16px;
            }
            .chart-bars {
                height: 130px;
            }
            .chart-bar-wrapper {

            }
            .chart-bar {
                border-radius: 4px 4px 0 0;
                min-height: 3px;
            }

                font-size: 6px;
            }

                font-size: 7px;

<body>

    <!-- ---- Fixed Background ---- -->
    <div class="bg-scene"></div>
    <div class="scene-overlay"></div>
    <div class="vignette"></div>

    <!-- ---- top bar ---- -->
    <div class="top-bar">
        <div class="left-group">
            <a href="timer.html" class="back-btn" title="Back to timer">
                <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            </a>
            <div class="logo">
                HISTORY
                <span class="logo-sub">by pushpraj</span>
            </div>
        </div>
        <div class="top-right">
            <div class="install-top">
                <button class="icon-btn hidden" id="installBtn" title="Install App">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </button>
            </div>
            <div class="info-row">
                <div class="weather" id="weatherDisplay">⛅ <span class="temp">--°</span></div>
            </div>
            <div class="clock" id="clock">--:--</div>
            <div class="running-time" id="runningTime">--:--:--</div>
        </div>
    </div>

    <!-- ---- main stage ---- -->
    <div class="stage" id="stage">

        <!-- ---- today hero (glass card) ---- -->
        <div class="glass-card" style="margin-bottom:16px; padding:20px 24px;">
            <div class="today-hero">
                <div>
                    <div class="label">Today</div>
                    <div class="time" id="todayTotalTime">--</div>
                    <div class="sessions-count" id="todaySessionsCount">0 sessions</div>
                </div>
                <div class="right">
                    <div style="font-size:32px; opacity:0.4;">🎯</div>
                </div>
            </div>
        </div>

        <!-- ---- overall stats ---- -->
        <div class="overall-stats" id="overallStats"></div>

        <!-- ---- section tabs ---- -->
        <div class="section-tabs" id="sectionTabs">
            <button class="tab-btn active" data-section="list">📋 List</button>
            <button class="tab-btn" data-section="chart">📊 Chart</button>
        </div>

        <!-- ---- sections ---- -->
        <div style="width:100%; max-width:700px;">

            <!-- Section: List -->
            <div class="section active" id="sectionList">
                <div class="glass-card" style="padding:16px 18px;">
                    <div id="historyContainer"></div>
                </div>
            </div>

            <!-- Section: Chart -->
            <div class="section" id="sectionChart">
                <div class="glass-card" style="padding:16px 18px;">
                    <div class="chart-section-wrap">
                        <div class="chart-header">
                            <span class="chart-label">Daily Focus</span>
                            <div class="chart-pagination">
                                <button class="arrow-btn" id="chartPrev" disabled>‹</button>
                                <span class="page-info" id="chartPageInfo">1 / 1</span>
                                <button class="arrow-btn" id="chartNext" disabled>›</button>
                            </div>
                        </div>
                        <div class="chart-range-label" id="chartRangeLabel"></div>
                        <div class="chart-view-toggle" id="chartViewToggle">
                            <button class="view-btn active" data-view="7">Week</button>
                            <button class="view-btn" data-view="30">Month</button>
                            <button class="view-btn" data-view="all">All</button>
                        </div>
                        <div class="chart-bars" id="chartBars"></div>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- ---- Floating timer badge ---- -->
    <a href="timer.html" id="bgTimerBadge" title="Timer running in background – click to go back">
        <span class="badge-dot"></span>
        <span class="badge-label">⏱</span>
        <span class="badge-time" id="bgTimerTime">--:--</span>
        <span class="badge-goto">→ timer</span>
    </a>

    <script>
        (function() {
            'use strict';

            // ---- Install button ----
            const installBtn = document.getElementById('installBtn');
            let deferredPrompt = null;
            let isAppInstalled = false;

            if (window.matchMedia('(display-mode: standalone)').matches) {
                isAppInstalled = true;
                installBtn.classList.remove('visible');
                installBtn.classList.add('hidden');
            }

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                if (!isAppInstalled) {
                    installBtn.classList.remove('hidden');
                    installBtn.classList.add('visible');
                }
            });

            window.addEventListener('appinstalled', () => {
                isAppInstalled = true;
                installBtn.classList.remove('visible');
                installBtn.classList.add('hidden');
                deferredPrompt = null;
            });

            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    try {
                        const result = await deferredPrompt.prompt();
                        if (result.outcome === 'accepted') {
                            isAppInstalled = true;
                            installBtn.classList.add('hidden');
                            installBtn.classList.remove('visible');
                        }
                    } catch (_) {
                        if (navigator.share) {
                            try {
                                await navigator.share({
                                    title: 'History',
                                    text: 'Check out my focus history!',
                                    url: window.location.href
                                });
                            } catch (_2) {}
                        }
                    }
                } else {
                    if (navigator.share) {
                        try {
                            await navigator.share({
                                title: 'History',
                                text: 'Check out my focus history!',
                                url: window.location.href
                            });
                        } catch (_) {}
                    }
                }
            });

            if (window.matchMedia('(display-mode: standalone)').matches) {
                installBtn.classList.add('hidden');
                installBtn.classList.remove('visible');
            }

            // ---- Clock & weather ----
            const clockEl = document.getElementById('clock');
            const runningTimeEl = document.getElementById('runningTime');
            const weatherDisplay = document.getElementById('weatherDisplay');

            function updateClock() {
                const now = new Date();
                const dateOptions = { month: 'short', day: '2-digit', year: 'numeric' };
                const dateStr = now.toLocaleString('en-US', dateOptions);
                clockEl.textContent = dateStr;
                const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
                const timeStr = now.toLocaleString('en-US', timeOptions);
                runningTimeEl.textContent = timeStr;
            }
            updateClock();
            setInterval(updateClock, 1000);

            async function fetchWeather() {
                try {
                    const pos = await new Promise((resolve, reject) => {
                        if (!navigator.geolocation) reject('Geolocation not supported');
                        navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000 });
                    });
                    const { latitude, longitude } = pos.coords;
                    const url =
                        `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&timezone=auto`;
                    const resp = await fetch(url);
                    const data = await resp.json();
                    if (data.current_weather) {
                        const temp = Math.round(data.current_weather.temperature);
                        let tempStr = temp.toString();
                        if (tempStr.startsWith('+')) tempStr = tempStr.substring(1);
                        weatherDisplay.innerHTML = `⛅ <span class="temp">${tempStr}°</span>`;
                    }
                } catch (_) {
                    try {
                        const resp = await fetch('https://wttr.in/?format=%t&lang=en');
                        const text = await resp.text();
                        const match = text.match(/([+-]?\d+°C)/);
                        if (match) {
                            const tempNum = parseFloat(match[1]);
                            weatherDisplay.innerHTML = `⛅ <span class="temp">${tempNum}°</span>`;
                        } else {
                            throw new Error('No temp');
                        }
                    } catch (_2) {
                        weatherDisplay.innerHTML = `⛅ <span class="temp">--°</span>`;
                    }
                }
            }
            fetchWeather();
            setInterval(fetchWeather, 600000);

            // ---- Floating timer badge ----
            const badge = document.getElementById('bgTimerBadge');
            const timeEl = document.getElementById('bgTimerTime');
            const KEY = 'focusTimerState';

            function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }
            function fmt(ms) {
                const totalSec = Math.max(0, Math.floor(ms / 1000));
                const h = Math.floor(totalSec / 3600);
                const m = Math.floor((totalSec % 3600) / 60);
                const s = totalSec % 60;
                return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
            }

            function updateTimerBadge() {
                try {
                    const raw = localStorage.getItem(KEY);
                    if (!raw) { badge.classList.remove('visible'); return; }
                    const st = JSON.parse(raw);
                    if (!st || !st.running) { badge.classList.remove('visible'); return; }
                    const passedMs = Date.now() - st.startTimestamp;
                    const totalElapsed = (st.accumulatedMs || 0) + passedMs;
                    let display;
                    if (st.mode === 'stopwatch') {
                        display = fmt(totalElapsed);
                    } else {
                        const left = Math.max(0, st.initialMs - totalElapsed);
                        if (left <= 0) { badge.classList.remove('visible'); return; }
                        display = fmt(left);
                    }
                    timeEl.textContent = display;
                    badge.classList.add('visible');
                } catch (_) {
                    badge.classList.remove('visible');
                }
            }
            updateTimerBadge();
            setInterval(updateTimerBadge, 500);

            // ---- History logic ----
            function loadSessions() {
                try {
                    const data = localStorage.getItem('focusSessions');
                    return data ? JSON.parse(data) : [];
                } catch (_) { return []; }
            }

            function formatDuration(ms) {
                if (ms < 1000) return '0s';
                const totalSec = Math.floor(ms / 1000);
                const minutes = Math.floor(totalSec / 60);
                const seconds = totalSec % 60;
                if (minutes >= 60) {
                    const hours = Math.floor(minutes / 60);
                    const mins = minutes % 60;
                    if (mins === 0) return `${hours}h`;
                    return `${hours}h ${mins}m`;
                }
                if (minutes > 0) {
                    if (seconds === 0) return `${minutes}m`;
                    return `${minutes}m ${seconds}s`;
                }
                return `${seconds}s`;
            }

            function formatDurationShort(ms) {
                if (ms < 1000) return '0m';
                const totalSec = Math.floor(ms / 1000);
                const minutes = Math.floor(totalSec / 60);
                if (minutes >= 60) {
                    const hours = Math.floor(minutes / 60);
                    const mins = minutes % 60;
                    if (mins === 0) return `${hours}h`;
                    return `${hours}h ${mins}m`;
                }
                return `${minutes}m`;
            }

            // ---- Local-date helpers (fixes day flipping at UTC midnight instead of local midnight) ----
            function toDateKey(d) {
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }

            function getTodayKey() {
                return toDateKey(new Date());
            }

            function dayLabel(dateKey) {
                const today = getTodayKey();
                const yestDate = new Date();
                yestDate.setDate(yestDate.getDate() - 1);
                const yesterday = toDateKey(yestDate);
                if (dateKey === today) return 'Today';
                if (dateKey === yesterday) return 'Yesterday';
                const dateObj = new Date(dateKey + 'T00:00:00');
                return dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            }

            function formatDateLabel(dateKey) {
                const d = new Date(dateKey + 'T00:00:00');
                return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }

            function formatDateLabelFull(dateKey) {
                const d = new Date(dateKey + 'T00:00:00');
                return d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' });
            }

            function groupByDay(sessions) {
                const groups = {};
                sessions.forEach(s => {
                    if (!groups[s.date]) groups[s.date] = [];
                    groups[s.date].push(s);
                });
                return Object.keys(groups)
                    .sort((a, b) => b.localeCompare(a))
                    .map(date => ({
                        date,
                        sessions: groups[date].sort((a, b) => b.timestamp - a.timestamp)
                    }));
            }

            let allSessions = [];
            let chartPage = 0;
            let chartView = '7'; // '7' | '30' | 'all'

            const todayTotalTime = document.getElementById('todayTotalTime');
            const todaySessionsCount = document.getElementById('todaySessionsCount');
            const overallStats = document.getElementById('overallStats');
            const historyContainer = document.getElementById('historyContainer');
            const chartBars = document.getElementById('chartBars');
            const chartPrev = document.getElementById('chartPrev');
            const chartNext = document.getElementById('chartNext');
            const chartPageInfo = document.getElementById('chartPageInfo');
            const chartRangeLabel = document.getElementById('chartRangeLabel');
            const chartViewToggle = document.getElementById('chartViewToggle');
            const sectionTabs = document.getElementById('sectionTabs');
            const sectionList = document.getElementById('sectionList');
            const sectionChart = document.getElementById('sectionChart');

            let touchStartX = 0;
            let touchEndX = 0;

            function renderTodayHero() {
                const todayKey = getTodayKey();
                const todaySessions = allSessions.filter(s => s.date === todayKey);
                const todayTotal = todaySessions.reduce((sum, s) => sum + s.durationMs, 0);
                todayTotalTime.textContent = formatDuration(todayTotal);
                todaySessionsCount.textContent = `${todaySessions.length} session${todaySessions.length !== 1 ? 's' : ''}`;
            }

            function renderOverallStats() {
                if (allSessions.length === 0) {
                    overallStats.innerHTML = '';
                    return;
                }
                const totalAllTime = allSessions.reduce((sum, s) => sum + s.durationMs, 0);
                const dayGroups = groupByDay(allSessions);
                overallStats.innerHTML = `
                    <div class="stat-card">
                        <div class="label">Total sessions</div>
                        <div class="value">${allSessions.length}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Total time</div>
                        <div class="value">${formatDuration(totalAllTime)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Days tracked</div>
                        <div class="value">${dayGroups.length}</div>
                    </div>
                `;
            }

            function renderList() {
                if (allSessions.length === 0) {
                    historyContainer.innerHTML = `
                        <div class="list-empty">
                            <span class="icon">🧘</span>
                            No sessions recorded yet.<br />
                            Start a focus session to see your history here.
                        </div>
                    `;
                    return;
                }

                const todayKey = getTodayKey();
                const dayGroups = groupByDay(allSessions);
                let html = '';
                dayGroups.forEach(group => {
                    const dayTotal = group.sessions.reduce((sum, s) => sum + s.durationMs, 0);
                    const isToday = group.date === todayKey;
                    const label = isToday ? 'Today' : dayLabel(group.date);
                    let sessionsHtml = '';
                    group.sessions.forEach(s => {
                        const timeStr = new Date(s.timestamp).toLocaleTimeString('en-US', {
                            hour: 'numeric',
                            minute: '2-digit'
                        });
                        const modeClass = s.mode === 'stopwatch' ? 'stopwatch' : 'timer';
                        const modeLabel = s.mode === 'stopwatch' ? '⏱️' : '⏲️';
                        sessionsHtml += `
                            <li>
                                <span class="session-time">${timeStr}</span>
                                <span class="session-duration">${formatDuration(s.durationMs)}</span>
                                <span class="session-mode ${modeClass}">${modeLabel} ${s.mode}</span>
                            </li>
                        `;
                    });
                    const countBadge = group.sessions.length > 1 ? `<span class="count-badge">${group.sessions.length}</span>` : '';
                    html += `
                        <div class="day-group">
                            <div class="day-header">
                                <span class="day-name">${label}</span>
                                <span class="day-total">${countBadge} ${formatDuration(dayTotal)} <span class="chevron">▼</span></span>
                            </div>
                            <ul class="day-sessions">${sessionsHtml}</ul>
                        </div>
                    `;
                });
                historyContainer.innerHTML = html;

                historyContainer.querySelectorAll('.day-header').forEach(header => {
                    header.addEventListener('click', () => {
                        const group = header.closest('.day-group');
                        group.classList.toggle('collapsed');
                    });
                });
            }

            function buildAllDates() {
                let allDates = [];
                if (allSessions.length > 0) {
                    let earliest = new Date();
                    allSessions.forEach(s => {
                        const d = new Date(s.date + 'T00:00:00');
                        if (d < earliest) earliest = d;
                    });
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    earliest.setHours(0, 0, 0, 0);
                    let current = new Date(earliest);
                    while (current <= today) {
                        allDates.push(toDateKey(current));
                        current.setDate(current.getDate() + 1);
                    }
                }
                return allDates;
            }

            function getPageSize() {
                if (chartView === '30') return 30;
                if (chartView === 'all') return Infinity;
                return 7;
            }

            function renderChart() {
                const allDates = buildAllDates();

                if (allDates.length === 0) {
                    chartBars.innerHTML = `<div class="chart-empty" style="width:100%;"><span class="icon">📊</span>No data to show.</div>`;
                    chartPrev.disabled = true;
                    chartNext.disabled = true;
                    chartPageInfo.textContent = '0 / 0';
                    chartRangeLabel.textContent = '';
                    return;
                }

                const PAGE_SIZE = getPageSize();
                const totalPages = Math.max(1, Math.ceil(allDates.length / PAGE_SIZE));
                if (chartPage >= totalPages) chartPage = totalPages - 1;
                if (chartPage < 0) chartPage = 0;

                const startIdx = Math.max(0, allDates.length - (chartPage + 1) * PAGE_SIZE);
                const endIdx = Math.min(allDates.length, allDates.length - chartPage * PAGE_SIZE);
                const pageDates = allDates.slice(startIdx, endIdx);

                chartPageInfo.textContent = `${chartPage + 1} / ${totalPages}`;
                chartPrev.disabled = chartPage >= totalPages - 1;
                chartNext.disabled = chartPage === 0;

                if (pageDates.length === 0) {
                    chartBars.innerHTML = `<div class="chart-empty" style="width:100%;"><span class="icon">📊</span>No data on this page.</div>`;
                    chartRangeLabel.textContent = '';
                    return;
                }

                if (pageDates.length > 1) {
                    chartRangeLabel.textContent = `${formatDateLabel(pageDates[0])} — ${formatDateLabel(pageDates[pageDates.length - 1])}`;
                } else {
                    chartRangeLabel.textContent = formatDateLabelFull(pageDates[0]);
                }

                const dayTotals = pageDates.map(date => {
                    const daySessions = allSessions.filter(s => s.date === date);
                    const total = daySessions.reduce((sum, s) => sum + s.durationMs, 0);
                    return { date, total, sessions: daySessions };
                });

                const maxTotal = Math.max(...dayTotals.map(d => d.total), 1);
                const activeDays = dayTotals.filter(d => d.total > 0);
                const avgTotal = activeDays.length > 0
                    ? activeDays.reduce((sum, d) => sum + d.total, 0) / activeDays.length
                    : 0;
                const avgPct = avgTotal > 0 ? Math.min((avgTotal / maxTotal) * 100, 100) : 0;
                const todayKey = getTodayKey();

                let barsHtml = '';
                if (avgTotal > 0 && dayTotals.length > 1) {
                    barsHtml += `
                        <div class="chart-avg-line" style="bottom: calc(${avgPct}% + 24px);">
                            <span class="chart-avg-tag">avg ${formatDurationShort(avgTotal)}</span>
                        </div>
                    `;
                }

                dayTotals.forEach(day => {
                    const hasData = day.total > 0;
                    const pct = hasData ? Math.max((day.total / maxTotal) * 100, 4) : 3;
                    const isToday = day.date === todayKey;
                    let barClass = 'chart-bar';
                    if (!hasData) barClass += ' empty-day';
                    else if (isToday) barClass += ' today';
                    const dayClass = isToday ? 'chart-bar-day today-label' : 'chart-bar-day';
                    const valueClass = isToday ? 'chart-bar-value today-value' : 'chart-bar-value';
                    const displayTotal = hasData ? formatDurationShort(day.total) : '';
                    const label = formatDateLabel(day.date);
                    const fullLabel = formatDateLabelFull(day.date);
                    const sessionCount = day.sessions.length;
                    const tooltipDuration = hasData ? formatDuration(day.total) : 'No sessions';
                    const tooltipSessions = hasData ? `${sessionCount} session${sessionCount !== 1 ? 's' : ''}` : '';
                    barsHtml += `
                        <div class="chart-bar-wrapper">
                            <div class="chart-bar-track" data-date="${day.date}">
                                <div class="chart-tooltip">
                                    ${fullLabel}
                                    <span class="tt-sessions">${tooltipDuration}${tooltipSessions ? ' · ' + tooltipSessions : ''}</span>
                                </div>
                                <div class="${barClass}" style="height: ${pct}%;"></div>
                            </div>
                            <div class="${valueClass}">${displayTotal}</div>
                            <div class="${dayClass}">${label}</div>
                        </div>
                    `;
                });
                chartBars.innerHTML = barsHtml;

                // Scroll to the end (most recent day) so "today" is visible without manual scrolling
                requestAnimationFrame(() => {
                    chartBars.scrollLeft = chartBars.scrollWidth;
                });
            }

            function fullRender() {
                renderTodayHero();
                renderOverallStats();
                renderList();
                renderChart();
            }

            function goToPage(page) {
                const allDates = buildAllDates();
                const PAGE_SIZE = getPageSize();
                const totalPages = Math.max(1, Math.ceil(allDates.length / PAGE_SIZE));
                if (page < 0) page = 0;
                if (page >= totalPages) page = totalPages - 1;
                chartPage = page;
                renderChart();
            }

            chartPrev.addEventListener('click', () => goToPage(chartPage + 1));
            chartNext.addEventListener('click', () => goToPage(chartPage - 1));

            chartViewToggle.addEventListener('click', (e) => {
                const btn = e.target.closest('.view-btn');
                if (!btn) return;
                chartViewToggle.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                chartView = btn.dataset.view;
                chartPage = 0;
                renderChart();
            });

            const chartWrap = document.querySelector('.chart-section-wrap');
            chartWrap.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            chartWrap.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                const diff = touchStartX - touchEndX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) goToPage(chartPage - 1);
                    else goToPage(chartPage + 1);
                }
            }, { passive: true });

            sectionTabs.addEventListener('click', (e) => {
                const btn = e.target.closest('.tab-btn');
                if (!btn) return;
                const section = btn.dataset.section;
                sectionTabs.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                if (section === 'list') {
                    sectionList.classList.add('active');
                    sectionChart.classList.remove('active');
                } else {
                    sectionChart.classList.add('active');
                    sectionList.classList.remove('active');
                    renderChart();
                }
            });

            // Init
            allSessions = loadSessions();
            fullRender();

            // Refresh at local midnight so "Today" rolls over without needing a reload
            function scheduleMidnightRefresh() {
                const now = new Date();
                const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 5);
                const msUntil = next.getTime() - now.getTime();
                setTimeout(() => {
                    allSessions = loadSessions();
                    fullRender();
                    scheduleMidnightRefresh();
                }, msUntil);
            }
            scheduleMidnightRefresh();

            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    allSessions = loadSessions();
                    fullRender();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if (sectionChart.classList.contains('active')) {
                    if (e.key === 'ArrowLeft') goToPage(chartPage + 1);
                    if (e.key === 'ArrowRight') goToPage(chartPage - 1);
                }
            });

            console.log('📊 History · Today on the right, past days on the left');
            console.log('📋 Swipe chart left/right or use arrow buttons');
        })();
    </script>

</body>
</html>
