<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Full History · FOCUS</title>

    <style>
        :root {
            --text-hi: rgba(255, 255, 255, 0.96);
            --text-lo: rgba(255, 255, 255, 0.65);
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-blue: #6bcbff;
            --accent-gold: #ffd93d;
            --bar-gradient: linear-gradient(180deg, #6bcbff 0%, #4a9ed6 100%);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', "SF Pro Display", "Segoe UI", sans-serif;
            background: #0a0c10;
            color: var(--text-hi);
        }

        body {
            position: relative;
            min-height: 100vh;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(107, 203, 255, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 215, 0, 0.03) 0%, transparent 50%),
                #0a0c10;
        }

        .page {
            max-width: 640px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* ---- Top bar ---- */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
        }

        .back-btn {
            width: 42px;
            height: 42px;
            flex-shrink: 0;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text-hi);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.16);
            transform: scale(1.05);
        }
        .back-btn:active {
            transform: scale(0.94);
        }
        .back-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .top-bar .title-group h1 {
            font-size: clamp(20px, 3vw, 26px);
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.01em;
            line-height: 1.2;
        }
        .top-bar .title-group .subtitle {
            color: var(--text-lo);
            font-size: 13px;
            margin-top: 1px;
            letter-spacing: 0.02em;
        }

        /* ---- Today's total (hero stat) ---- */
        .today-hero {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .today-hero .label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-lo);
            letter-spacing: 0.04em;
        }
        .today-hero .time {
            font-size: clamp(28px, 4.5vw, 42px);
            font-weight: 700;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, #6bcbff 0%, #ffd93d 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .today-hero .sessions-count {
            font-size: 12px;
            color: var(--text-lo);
            margin-top: 2px;
        }
        .today-hero .right {
            text-align: right;
        }

        /* ---- Chart ---- */
        .chart-section {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border-radius: 20px;
            padding: 20px 16px 18px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .chart-section .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding: 0 4px;
        }
        .chart-section .chart-header .chart-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-lo);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .chart-section .chart-header .chart-total {
            font-size: 12px;
            color: var(--text-lo);
        }
        .chart-section .chart-header .chart-total span {
            color: var(--text-hi);
            font-weight: 600;
        }

        .chart-bars {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 140px;
            padding: 0 4px;
            gap: 6px;
        }

        .chart-bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            height: 100%;
            justify-content: flex-end;
        }

        .chart-bar-track {
            width: 100%;
            max-width: 48px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border-radius: 6px 6px 0 0;
            background: rgba(255, 255, 255, 0.04);
            position: relative;
            overflow: visible;
        }

        .chart-bar {
            width: 100%;
            border-radius: 6px 6px 0 0;
            min-height: 4px;
            background: var(--bar-gradient);
            transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            box-shadow: 0 0 20px rgba(107, 203, 255, 0.15);
        }
        .chart-bar.today {
            background: linear-gradient(180deg, #ffd93d 0%, #f5a623 100%);
            box-shadow: 0 0 24px rgba(255, 215, 0, 0.2);
        }

        .chart-bar-label {
            font-size: 9px;
            color: var(--text-lo);
            font-weight: 500;
            letter-spacing: 0.02em;
            margin-top: 4px;
            text-align: center;
        }

        .chart-bar-value {
            font-size: 8px;
            color: var(--text-lo);
            font-weight: 500;
            text-align: center;
            margin-bottom: 2px;
            opacity: 0.7;
            white-space: nowrap;
        }

        .chart-bar-day {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-lo);
            letter-spacing: 0.03em;
            text-align: center;
            margin-top: 2px;
        }
        .chart-bar-day.today-label {
            color: var(--accent-gold);
        }

        /* ---- Overall stats ---- */
        .overall-stats {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .overall-stats .stat-card {
            flex: 1;
            min-width: 100px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px) saturate(160%);
            -webkit-backdrop-filter: blur(16px) saturate(160%);
            border-radius: 14px;
            padding: 14px 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }
        .overall-stats .stat-card .label {
            font-size: 10px;
            color: var(--text-lo);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
        }
        .overall-stats .stat-card .value {
            font-size: 20px;
            font-weight: 700;
            margin-top: 4px;
        }

        /* ---- Day groups (session list) ---- */
        .day-group {
            margin-bottom: 12px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px) saturate(160%);
            -webkit-backdrop-filter: blur(16px) saturate(160%);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
        }
        .day-group:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .day-header:hover {
            background: rgba(255, 255, 255, 0.04);
        }
        .day-header .day-name {
            font-weight: 600;
            font-size: 14.5px;
            letter-spacing: 0.01em;
        }
        .day-header .day-total {
            font-size: 12.5px;
            color: var(--text-lo);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .day-header .day-total .count-badge {
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 500;
        }
        .day-header .chevron {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 10px;
            color: var(--text-lo);
            margin-left: 4px;
        }
        .day-group.collapsed .chevron {
            transform: rotate(-90deg);
        }

        .day-sessions {
            list-style: none;
            margin: 0;
            padding: 0 14px 14px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .day-group.collapsed .day-sessions {
            display: none;
        }

        .day-sessions li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            font-size: 12.5px;
            color: var(--text-lo);
            transition: background 0.2s;
        }
        .day-sessions li:hover {
            background: rgba(255, 255, 255, 0.06);
        }
        .day-sessions li .session-time {
            font-weight: 500;
            color: var(--text-hi);
            font-variant-numeric: tabular-nums;
        }
        .day-sessions li .session-duration {
            font-weight: 500;
            color: var(--text-hi);
            font-variant-numeric: tabular-nums;
        }
        .day-sessions li .session-mode {
            font-size: 9.5px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.06);
            padding: 2px 12px;
            border-radius: 100px;
            letter-spacing: 0.03em;
        }
        .day-sessions li .session-mode.stopwatch {
            color: var(--accent-blue);
            background: rgba(107, 203, 255, 0.10);
        }
        .day-sessions li .session-mode.timer {
            color: var(--accent-gold);
            background: rgba(255, 215, 0, 0.10);
        }

        /* ---- Empty state ---- */
        .empty-state {
            text-align: center;
            color: var(--text-lo);
            padding: 60px 20px;
            font-size: 14px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(16px);
        }
        .empty-state .icon {
            font-size: 36px;
            display: block;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* ---- scrollbar ---- */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        /* ---- responsive ---- */
        @media (max-width: 480px) {
            .page {
                padding: 14px 12px 32px;
            }
            .today-hero {
                padding: 16px 18px;
                border-radius: 16px;
            }
            .today-hero .time {
                font-size: clamp(24px, 5vw, 32px);
            }
            .chart-section {
                padding: 14px 10px 14px;
                border-radius: 16px;
            }
            .chart-bars {
                height: 110px;
                gap: 4px;
            }
            .chart-bar-track {
                max-width: 32px;
            }
            .chart-bar-label {
                font-size: 7px;
            }
            .chart-bar-value {
                font-size: 7px;
            }
            .chart-bar-day {
                font-size: 8px;
            }
            .overall-stats .stat-card {
                min-width: 80px;
                padding: 10px 12px;
            }
            .overall-stats .stat-card .value {
                font-size: 16px;
            }
            .day-header {
                padding: 12px 14px;
            }
            .day-header .day-name {
                font-size: 13px;
            }
            .day-header .day-total {
                font-size: 11px;
                gap: 6px;
            }
            .day-header .day-total .count-badge {
                font-size: 10px;
                padding: 1px 8px;
            }
            .day-sessions {
                padding: 0 10px 10px;
            }
            .day-sessions li {
                font-size: 11.5px;
                padding: 5px 10px;
            }
            .top-bar .title-group h1 {
                font-size: 18px;
            }
            .top-bar .title-group .subtitle {
                font-size: 11px;
            }
            .back-btn {
                width: 36px;
                height: 36px;
            }
            .back-btn svg {
                width: 17px;
                height: 17px;
            }
        }

        @media (max-width: 380px) {
            .chart-bars {
                height: 90px;
                gap: 3px;
            }
            .chart-bar-track {
                max-width: 26px;
                border-radius: 4px 4px 0 0;
            }
            .chart-bar {
                border-radius: 4px 4px 0 0;
                min-height: 3px;
            }
            .chart-bar-label {
                font-size: 6px;
            }
            .chart-bar-value {
                font-size: 6px;
            }
            .chart-bar-day {
                font-size: 7px;
            }
            .overall-stats {
                gap: 6px;
            }
            .overall-stats .stat-card {
                min-width: 60px;
                padding: 8px 10px;
            }
            .overall-stats .stat-card .value {
                font-size: 14px;
            }
            .overall-stats .stat-card .label {
                font-size: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- Top bar -->
        <div class="top-bar">
            <a href="timer.html" class="back-btn" title="Back to timer">
                <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            </a>
            <div class="title-group">
                <h1>Session History</h1>
                <div class="subtitle">Your focus journey, tracked daily</div>
            </div>
        </div>

        <!-- Today hero -->
        <div class="today-hero" id="todayHero">
            <div>
                <div class="label">Today</div>
                <div class="time" id="todayTotalTime">--</div>
                <div class="sessions-count" id="todaySessionsCount">0 sessions</div>
            </div>
            <div class="right">
                <div style="font-size:32px; opacity:0.4;">🎯</div>
            </div>
        </div>

        <!-- Chart -->
        <div class="chart-section" id="chartSection">
            <div class="chart-header">
                <span class="chart-label">Weekly Activity</span>
                <span class="chart-total">Week total: <span id="weekTotalTime">--</span></span>
            </div>
            <div class="chart-bars" id="chartBars"></div>
        </div>

        <!-- Overall stats -->
        <div class="overall-stats" id="overallStats"></div>

        <!-- Session list -->
        <div id="historyContainer"></div>
    </div>

    <script>
        function loadSessions() {
            try {
                const data = localStorage.getItem('focusSessions');
                return data ? JSON.parse(data) : [];
            } catch (_) {
                return [];
            }
        }

        function formatDuration(ms) {
            if (ms < 1000) return '0s';
            const totalSec = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSec / 60);
            const seconds = totalSec % 60;
            if (minutes >= 60) {
                const hours = Math.floor(minutes / 60);
                const mins = minutes % 60;
                if (mins === 0) return `${hours}h`;
                return `${hours}h ${mins}m`;
            }
            if (minutes > 0) {
                if (seconds === 0) return `${minutes}m`;
                return `${minutes}m ${seconds}s`;
            }
            return `${seconds}s`;
        }

        function formatDurationShort(ms) {
            if (ms < 1000) return '0m';
            const totalSec = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSec / 60);
            if (minutes >= 60) {
                const hours = Math.floor(minutes / 60);
                const mins = minutes % 60;
                if (mins === 0) return `${hours}h`;
                return `${hours}h ${mins}m`;
            }
            return `${minutes}m`;
        }

        function getDayKey(date) {
            return date.toISOString().split('T')[0];
        }

        function getTodayKey() {
            return getDayKey(new Date());
        }

        function getDayOfWeek(date) {
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            return days[date.getDay()];
        }

        function groupByDay(sessions) {
            const groups = {};
            sessions.forEach(s => {
                if (!groups[s.date]) groups[s.date] = [];
                groups[s.date].push(s);
            });
            return Object.keys(groups)
                .sort((a, b) => b.localeCompare(a))
                .map(date => ({
                    date,
                    sessions: groups[date].sort((a, b) => b.timestamp - a.timestamp)
                }));
        }

        function dayLabel(dateKey) {
            const today = getTodayKey();
            const yestDate = new Date();
            yestDate.setDate(yestDate.getDate() - 1);
            const yesterday = getDayKey(yestDate);
            if (dateKey === today) return 'Today';
            if (dateKey === yesterday) return 'Yesterday';
            const dateObj = new Date(dateKey + 'T00:00:00');
            return dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        function getWeekDays() {
            const today = new Date();
            const dayOfWeek = today.getDay();
            const days = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() - dayOfWeek + i);
                d.setHours(0, 0, 0, 0);
                days.push(d);
            }
            return days;
        }

        function render() {
            const sessions = loadSessions();
            const container = document.getElementById('historyContainer');
            const overallStats = document.getElementById('overallStats');
            const todayTotalTime = document.getElementById('todayTotalTime');
            const todaySessionsCount = document.getElementById('todaySessionsCount');
            const chartBars = document.getElementById('chartBars');
            const weekTotalTime = document.getElementById('weekTotalTime');

            const todayKey = getTodayKey();
            const todaySessions = sessions.filter(s => s.date === todayKey);
            const todayTotal = todaySessions.reduce((sum, s) => sum + s.durationMs, 0);

            todayTotalTime.textContent = formatDuration(todayTotal);
            todaySessionsCount.textContent = `${todaySessions.length} session${todaySessions.length !== 1 ? 's' : ''}`;

            // ---- Chart ----
            const weekDays = getWeekDays();
            const weekData = weekDays.map(day => {
                const key = getDayKey(day);
                const daySessions = sessions.filter(s => s.date === key);
                const total = daySessions.reduce((sum, s) => sum + s.durationMs, 0);
                return { date: key, day: getDayOfWeek(day), total, isToday: key === todayKey };
            });

            const maxTotal = Math.max(...weekData.map(d => d.total), 1);
            const weekSum = weekData.reduce((sum, d) => sum + d.total, 0);
            weekTotalTime.textContent = formatDuration(weekSum);

            let chartHtml = '';
            weekData.forEach((d, idx) => {
                const pct = Math.max((d.total / maxTotal) * 100, 4);
                const isToday = d.isToday;
                const barClass = isToday ? 'chart-bar today' : 'chart-bar';
                const dayClass = isToday ? 'chart-bar-day today-label' : 'chart-bar-day';
                const displayTotal = d.total > 0 ? formatDurationShort(d.total) : '';
                chartHtml += `
                        <div class="chart-bar-wrapper">
                            <div class="chart-bar-track">
                                <div class="${barClass}" style="height: ${pct}%;"></div>
                            </div>
                            <div class="chart-bar-value">${displayTotal}</div>
                            <div class="${dayClass}">${d.day}</div>
                        </div>
                    `;
            });
            chartBars.innerHTML = chartHtml;

            // ---- Overall stats ----
            if (sessions.length === 0) {
                overallStats.innerHTML = '';
                container.innerHTML = `
                        <div class="empty-state">
                            <span class="icon">🧘</span>
                            No sessions recorded yet.<br />
                            Start a focus session to see your history here.
                        </div>
                    `;
                return;
            }

            const totalAllTime = sessions.reduce((sum, s) => sum + s.durationMs, 0);
            const dayGroups = groupByDay(sessions);

            overallStats.innerHTML = `
                    <div class="stat-card">
                        <div class="label">Total sessions</div>
                        <div class="value">${sessions.length}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Total time</div>
                        <div class="value">${formatDuration(totalAllTime)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Days tracked</div>
                        <div class="value">${dayGroups.length}</div>
                    </div>
                `;

            // ---- Session list ----
            let html = '';
            dayGroups.forEach(group => {
                const dayTotal = group.sessions.reduce((sum, s) => sum + s.durationMs, 0);
                const isToday = group.date === todayKey;
                const label = isToday ? 'Today' : dayLabel(group.date);
                let sessionsHtml = '';
                group.sessions.forEach(s => {
                    const timeStr = new Date(s.timestamp).toLocaleTimeString('en-US', {
                        hour: 'numeric',
                        minute: '2-digit'
                    });
                    const modeClass = s.mode === 'stopwatch' ? 'stopwatch' : 'timer';
                    const modeLabel = s.mode === 'stopwatch' ? '⏱️' : '⏲️';
                    sessionsHtml += `
                            <li>
                                <span class="session-time">${timeStr}</span>
                                <span class="session-duration">${formatDuration(s.durationMs)}</span>
                                <span class="session-mode ${modeClass}">${modeLabel} ${s.mode}</span>
                            </li>
                        `;
                });
                const countBadge = group.sessions.length > 1 ? `<span class="count-badge">${group.sessions.length}</span>` :
                    '';
                html += `
                        <div class="day-group">
                            <div class="day-header">
                                <span class="day-name">${label}</span>
                                <span class="day-total">${countBadge} ${formatDuration(dayTotal)} <span class="chevron">▼</span></span>
                            </div>
                            <ul class="day-sessions">${sessionsHtml}</ul>
                        </div>
                    `;
            });
            container.innerHTML = html;

            // ---- Toggle collapse ----
            container.querySelectorAll('.day-header').forEach(header => {
                header.addEventListener('click', () => {
                    const group = header.closest('.day-group');
                    group.classList.toggle('collapsed');
                });
            });
        }

        render();
    </script>
</body>
</html>
