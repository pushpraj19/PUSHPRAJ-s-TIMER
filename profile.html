<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0a0c10">
  <title>Profile · FOCUS</title><link rel="icon" href="logo.png"><link rel="manifest" href="manifest.webmanifest">
  <script src="pwa-register.js" defer></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script><script src="supabase-config.js" defer></script><script src="account-sync.js" defer></script><script src="profile.js" defer></script>
  <style>
    :root{color:#f8fafc;background:#0a0c10;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;padding:0 16px;color:#f8fafc}.scene,.overlay,.vignette{position:fixed;inset:0;pointer-events:none}.scene{z-index:-3;background:center/cover url('https://flocus.com/aesthetic-stopwatch/resources/images/themes/b075c800cadd3c9d930f.jpg')}.overlay{z-index:-2;background:linear-gradient(180deg,#0a0c105e,#0a0c1026 35%,#0a0c10b5)}.vignette{z-index:-1;box-shadow:inset 0 0 180px #0009}.page{width:min(100%,880px);margin:0 auto;padding:34px 0 70px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}.brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.12em}.brand img{width:38px;height:38px;border-radius:11px}.back{color:#e2f4fb;text-decoration:none;font-size:14px;padding:10px 13px;border-radius:10px;background:#07101470;border:1px solid #ffffff2d}.card{background:#0710148c;border:1px solid #ffffff42;border-radius:21px;padding:clamp(20px,4vw,28px);backdrop-filter:blur(18px);box-shadow:0 12px 35px #0004;margin-bottom:16px}.identity{display:flex;gap:16px;align-items:center}.identity h1{margin:0 0 4px;font-size:clamp(25px,5vw,34px)}.avatar{width:66px;height:66px;flex:0 0 66px;border-radius:50%;display:grid;place-items:center;background:#76d5ff;color:#062030;font-size:25px;font-weight:800;box-shadow:0 0 0 5px #ffffff16}.muted{color:#c8d8e0}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.stat{padding:18px;border-radius:15px;background:#07101485;border:1px solid #ffffff2d;backdrop-filter:blur(14px)}.stat strong{display:block;font-size:25px;margin-top:6px}input{width:min(100%,345px);padding:12px;border:1px solid #ffffff55;border-radius:10px;background:#071014a8;color:#fff;font:inherit;outline:0}input:focus{border-color:#76d5ff;box-shadow:0 0 0 3px #76d5ff2b}button{padding:12px 15px;border:0;border-radius:10px;background:#76d5ff;color:#062030;font-weight:800;cursor:pointer;margin:10px 7px 0 0}.ghost{background:#ffffff19;color:#fff;border:1px solid #ffffff33}.history{list-style:none;margin:0;padding:0}.history li{display:flex;justify-content:space-between;gap:16px;padding:13px 0;border-bottom:1px solid #ffffff27}.history li:last-child{border:0}@media(max-width:540px){body{padding:0 14px}.page{padding-top:20px}.top{margin-bottom:20px}.brand{font-size:14px}.back{padding:8px 10px}.grid{grid-template-columns:1fr}.identity{align-items:flex-start}.scene{background-position:58% center}button{width:100%;margin-right:0}}
  </style>
</head><body><div class="scene"></div><div class="overlay"></div><div class="vignette"></div><main class="page"><div class="top"><div class="brand"><img src="logo.png" alt="">FOCUS</div><a class="back" href="index.html">← Back to app</a></div><section class="card"><div class="identity"><div class="avatar" id="avatar">?</div><div><h1 id="name">Your profile</h1><p class="muted" id="email">Sign in to sync your data.</p></div></div><div id="profile-controls" hidden><p class="muted">Profile name</p><input id="display-name" maxlength="40" placeholder="Your name"><button id="save-name">Save name</button><button class="ghost" id="logout">Log out</button><p class="muted" id="sync-status"></p></div></section><section class="grid"><div class="stat"><span class="muted">Focus time</span><strong id="focus-time">0m</strong></div><div class="stat"><span class="muted">Sessions</span><strong id="session-count">0</strong></div><div class="stat"><span class="muted">Today</span><strong id="today-time">0m</strong></div></section><section class="card"><h2>Recent time history</h2><p class="muted">Your latest completed focus sessions.</p><ul class="history" id="history"><li class="muted">No saved sessions yet.</li></ul></section></main></body></html>
