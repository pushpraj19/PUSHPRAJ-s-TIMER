<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0a0c10">
  <title>Profile · FOCUS</title><link rel="icon" href="logo.png"><link rel="manifest" href="manifest.webmanifest">
  <script src="pwa-register.js" defer></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script><script src="supabase-config.js" defer></script><script src="account-sync.js" defer></script><script src="profile.js" defer></script>
  <style>body{margin:0;min-height:100vh;color:#f8fafc;background:radial-gradient(circle at top,#19334a,#0a0c10 56%);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.page{width:min(100% - 32px,840px);margin:0 auto;padding:34px 0 70px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px}.brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.12em}.brand img{width:36px;height:36px;border-radius:10px}.back{color:#c7d4dd;text-decoration:none;font-size:14px}.card{background:#ffffff12;border:1px solid #ffffff27;border-radius:20px;padding:24px;backdrop-filter:blur(14px);margin-bottom:16px}.identity{display:flex;gap:16px;align-items:center}.avatar{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;background:#76d5ff;color:#062030;font-size:24px;font-weight:800}.muted{color:#b6c5ce}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.stat{padding:16px;border-radius:14px;background:#ffffff0c}.stat strong{display:block;font-size:24px;margin-top:5px}input{width:min(100%,330px);padding:11px;border:1px solid #ffffff33;border-radius:9px;background:#ffffff12;color:#fff;font:inherit}button{padding:11px 14px;border:0;border-radius:9px;background:#76d5ff;color:#062030;font-weight:800;cursor:pointer;margin:8px 7px 0 0}.ghost{background:#ffffff16;color:#fff}.history{list-style:none;margin:0;padding:0}.history li{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #ffffff18}.history li:last-child{border:0}@media(max-width:540px){.grid{grid-template-columns:1fr}.page{padding-top:20px}}</style>
</head><body><main class="page"><div class="top"><div class="brand"><img src="logo.png">FOCUS</div><a class="back" href="index.html">← Back to app</a></div><section class="card"><div class="identity"><div class="avatar" id="avatar">?</div><div><h1 id="name">Your profile</h1><p class="muted" id="email">Sign in to sync your data.</p></div></div><div id="profile-controls" hidden><p class="muted">Profile name</p><input id="display-name" maxlength="40" placeholder="Your name"><button id="save-name">Save name</button><button class="ghost" id="logout">Log out</button><p class="muted" id="sync-status"></p></div></section><section class="grid"><div class="stat"><span class="muted">Focus time</span><strong id="focus-time">0m</strong></div><div class="stat"><span class="muted">Sessions</span><strong id="session-count">0</strong></div><div class="stat"><span class="muted">Today</span><strong id="today-time">0m</strong></div></section><section class="card"><h2>Recent time history</h2><p class="muted">Your latest completed focus sessions.</p><ul class="history" id="history"><li class="muted">No saved sessions yet.</li></ul></section></main></body></html>
