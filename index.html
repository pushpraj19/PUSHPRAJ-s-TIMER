    <!-- ---- Favicon & PWA Icons (local files) ---- -->
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <link rel="manifest" id="manifestLink" />
    <script>
        // Generate manifest with local logo.png
        (function() {
            const manifest = {
                name: "FOCUS Timer",
                short_name: "FOCUS",
                description: "Focus timer with stopwatch, timer, scenic backgrounds, and session tracking.",
                start_url: ".",
                display: "standalone",
                background_color: "#0a0c10",
                theme_color: "#0a0c10",
                icons: [
                    {
                        src: "logo.png",
                        sizes: "192x192",
                        type: "image/png"
                    },
                    {
                        src: "logo.png",
                        sizes: "512x512",
                        type: "image/png"
                    }
                ]
            };
            const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            document.getElementById('manifestLink').href = url;
        })();
    </script>

            -webkit-backdrop-filter: blur(24px) saturate(160%);
            box-shadow: 0 20px 50px -20px rgba(0, 0, 0, 0.5);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(.4, 0, .2, 1);
            min-width: 280px;
            max-width: 92vw;
        }
        .scene-picker.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }

        .scene-picker .thumbs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .scene-thumb {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.25s ease;
            opacity: 0.75;
            flex-shrink: 0;
            position: relative;
        }
        .scene-thumb:hover {
            opacity: 1;
            transform: translateY(-2px);
        }
        .scene-thumb.active {
            border-color: rgba(255, 255, 255, 0.85);
            opacity: 1;
        }
        .scene-thumb.custom-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            border-style: dashed;
        }
        .scene-thumb.custom-thumb:hover {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
        }
        .scene-thumb.custom-thumb.active {
            border-color: rgba(255, 255, 255, 0.85);
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
        }

        /* ---- custom bg panel ---- */
        .custom-panel {
            display: none;
            flex-direction: column;
            gap: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.10);
            margin-top: 2px;
        }
        .custom-panel.open {
            display: flex;
        }

        .custom-panel .input-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .custom-panel input[type="text"] {
            flex: 1;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 12px;
            font-family: inherit;
            outline: none;
            transition: border 0.2s;
            min-width: 0;
        }
        .custom-panel input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }
        .custom-panel input[type="text"]:focus {
            border-color: rgba(255, 255, 255, 0.4);
        }

        .custom-panel .file-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .custom-panel .file-label {
            padding: 6px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.75);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }
        .custom-panel .file-label:hover {
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
        }
        .custom-panel .file-label input[type="file"] {
            display: none;
        }
        .custom-panel .apply-btn {
            padding: 6px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            white-space: nowrap;
        }
        .custom-panel .apply-btn:hover {
            background: rgba(255, 255, 255, 0.24);
        }
        .custom-panel .apply-btn:active {
            transform: scale(0.96);
        }

        .custom-panel .status-msg {
            font-size: 11px;
            color: var(--text-lo);
            text-align: center;
            min-height: 18px;
            margin-top: 2px;
        }
        .custom-panel .status-msg.error {
            color: #ffa59e;
        }
        .custom-panel .status-msg.success {
            color: #9ed9b0;
        }

        ::selection {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ---- responsive ---- */
        @media (max-width: 480px) {
            .top-bar {
                top: 14px;
                left: 16px;
                right: 16px;
            }
            .logo {
                font-size: clamp(28px, 5vw, 42px);
            }
            .logo-sub {
                font-size: 0.3em;
                margin-top: -3px;
            }
            .weather {
                font-size: 12px;
                min-height: 18px;
            }
            .today-total {
                font-size: 12px;
                min-height: 18px;
            }
            .clock {
                font-size: 12px;
            }
            .running-time {
                font-size: 12px;
            }
            .control-bar {
                padding: 8px;
                gap: 6px;
                bottom: 18px;
                border-radius: 18px;
            }
            .btn {
                padding: 10px 16px;
                font-size: 12px;
                min-width: 54px;
            }
            .icon-btn {
                width: 36px;
                height: 36px;
                border-radius: 12px;
            }
            .icon-btn svg {
                width: 14px;
                height: 14px;
            }
            .scene-picker {
                bottom: 72px;
                padding: 10px 12px 12px 12px;
                min-width: unset;
                width: calc(100vw - 28px);
            }
            .scene-thumb {
                width: 38px;
                height: 38px;
                border-radius: 10px;
            }
            .ambient-popover {
                bottom: 72px;
                padding: 8px 12px;
                gap: 6px;
                max-width: calc(100vw - 24px);
            }
            .ambient-btn-option {
                font-size: 10px;
                padding: 5px 12px;
            }
            .timer {
                font-size: clamp(72px, 16vw, 110px);
            }
            .state-label {
                font-size: 11px;
            }
            .mode-btn {
                font-size: 11px;
                padding: 5px 16px;
            }
            .preset-btn {
                font-size: 10px;
                padding: 4px 12px;
            }
            .custom-time-input input {
                width: 50px;
                font-size: 11px;
            }
            .custom-time-input .set-btn {
                font-size: 10px;
                padding: 4px 10px;
            }
            .session-panel {
                width: calc(100vw - 32px);
                bottom: 130px;
                max-height: 50vh;
            }
            .todo-panel {
                width: calc(100vw - 32px);
                bottom: 130px;
                max-height: 50vh;
            }
        }

        @media (max-width: 380px) {
            .control-bar {
                gap: 4px;
                padding: 6px;
            }
            .btn {
                padding: 8px 12px;
                font-size: 11px;
                min-width: 44px;
            }
            .icon-btn {
                width: 32px;
                height: 32px;
            }
            .timer {
                font-size: clamp(56px, 14vw, 85px);
            }
            .scene-thumb {
                width: 34px;
                height: 34px;
            }
            .mode-btn {
                font-size: 10px;
                padding: 4px 12px;
            }
        }

        /* Wake Lock indicator */
        .wake-indicator {
            display: none;
            position: fixed;
            bottom: 82px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            pointer-events: none;
        }
        .wake-indicator.active {
            display: block;
        }

        /* scrollbar styling */
        .todo-list::-webkit-scrollbar,
        .session-list::-webkit-scrollbar {
            width: 4px;
        }
        .todo-list::-webkit-scrollbar-track,
        .session-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .todo-list::-webkit-scrollbar-thumb,
        .session-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- ---- scenes (presets) ---- -->
    <div class="scene active" id="scene-rain" style="background-image:url('https://flocus.com/aesthetic-stopwatch/resources/images/themes/b075c800cadd3c9d930f.jpg');"></div>
    <div class="scene" id="scene-forest" style="background-image:url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1600&auto=format&fit=crop');"></div>
    <div class="scene" id="scene-lake" style="background-image:url('https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?q=80&w=1600&auto=format&fit=crop');"></div>
    <div class="scene" id="scene-cafe" style="background-image:url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1600&auto=format&fit=crop');"></div>
    <div class="scene" id="scene-ocean" style="background-image:url('https://images.unsplash.com/photo-1505228395891-9a51e7e86bf6?q=80&w=1600&auto=format&fit=crop');"></div>
    <div class="scene" id="scene-night" style="background-image:url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=1600&auto=format&fit=crop');"></div>
    <div class="scene" id="scene-city" style="background-image:url('https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?q=80&w=1600&auto=format&fit=crop');"></div>
    <div class="scene custom-bg" id="scene-custom" style="display:none; background-image:none;"></div>

    <div class="scene-overlay"></div>
    <div class="vignette"></div>

    <!-- ---- top bar ---- -->
    <div class="top-bar">
        <div class="logo">
            FOCUS
            <span class="logo-sub">by pushpraj</span>
        </div>
        <div class="top-right">
            <div class="info-row">
                <div class="weather loading" id="weatherDisplay">⛅ <span class="temp">--°</span></div>
                <div class="today-total" id="todayTotal">🎯 <span class="highlight">0m</span></div>
            </div>
            <div class="clock" id="clock">--:--</div>
            <div class="running-time" id="runningTime">--:--:--</div>
        </div>
    </div>

    <!-- ---- stage ---- -->
    <div class="stage">
        <!-- Mode Toggle -->
        <div class="mode-toggle" id="modeToggle">
            <button class="mode-btn active" data-mode="stopwatch">Stopwatch</button>
            <button class="mode-btn" data-mode="timer">Timer</button>
        </div>

        <!-- Timer Display -->
        <div class="timer" id="timerDisplay">00:00.00</div>

        <!-- Timer Controls (presets + custom) -->
        <div class="timer-controls" id="timerControls">
            <div class="preset-row">
                <button class="preset-btn" data-seconds="300">5m</button>
                <button class="preset-btn" data-seconds="900">15m</button>
                <button class="preset-btn active" data-seconds="1500">25m</button>
                <button class="preset-btn" data-seconds="3600">60m</button>
            </div>
            <div class="preset-row" id="savedPresets"></div>
            <div class="custom-time-input">
                <input type="number" id="customMinutes" min="1" max="999" placeholder="mm" />
                <span style="color:rgba(255,255,255,0.3); font-size:11px;">:</span>
                <input type="number" id="customSeconds" min="0" max="59" placeholder="ss" />
                <button class="set-btn" id="setCustomTime">Set</button>
                <button class="set-btn" id="savePresetBtn" title="Save as named preset">💾</button>
            </div>
        </div>

        <div class="state-label" id="stateLabel">Ready</div>
    </div>

    <!-- Wake Lock indicator -->
    <div class="wake-indicator" id="wakeIndicator">⚡ screen awake</div>

    <!-- ---- Session history panel ---- -->
    <div class="session-panel" id="sessionPanel">
        <div class="header">
            <span>📊 Session History</span>
            <button class="close-btn" id="closeSessionBtn">✕</button>
        </div>
        <ul class="session-list" id="sessionList">
            <li class="session-empty">No sessions yet. Start focusing!</li>
        </ul>
        <div class="footer-stats">
            <span>Total sessions: <span class="stat-value" id="totalSessionsStat">0</span></span>
            <span>Total time: <span class="stat-value" id="totalTimeStat">0m</span></span>
        </div>
    </div>

    <!-- ---- ambient popover ---- -->
    <div class="ambient-popover" id="ambientPopover">
        <button class="ambient-btn-option active" data-sound="none">🔇 None</button>
        <button class="ambient-btn-option" data-sound="forest">🌲 Forest</button>
        <button class="ambient-btn-option" data-sound="waves">🌊 Waves</button>
        <button class="ambient-btn-option" data-sound="waterfall">💧 Waterfall</button>
        <button class="ambient-btn-option" data-sound="cafe">☕ Cafe</button>
        <button class="ambient-btn-option" data-sound="night">🌙 Night</button>
    </div>

    <!-- ---- scene picker ---- -->
    <div class="scene-picker" id="scenePicker">
        <div class="thumbs">
            <div class="scene-thumb active" data-scene="scene-rain" style="background-image:url('https://flocus.com/aesthetic-stopwatch/resources/images/themes/b075c800cadd3c9d930f.jpg');" title="Default"></div>
            <div class="scene-thumb" data-scene="scene-forest" style="background-image:url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=200&auto=format&fit=crop');" title="Forest"></div>
            <div class="scene-thumb" data-scene="scene-lake" style="background-image:url('https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?q=80&w=200&auto=format&fit=crop');" title="Lake"></div>
            <div class="scene-thumb" data-scene="scene-cafe" style="background-image:url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=200&auto=format&fit=crop');" title="Cafe"></div>
            <div class="scene-thumb" data-scene="scene-ocean" style="background-image:url('https://images.unsplash.com/photo-1505228395891-9a51e7e86bf6?q=80&w=200&auto=format&fit=crop');" title="Ocean"></div>
            <div class="scene-thumb" data-scene="scene-night" style="background-image:url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=200&auto=format&fit=crop');" title="Night"></div>
            <div class="scene-thumb" data-scene="scene-city" style="background-image:url('https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?q=80&w=200&auto=format&fit=crop');" title="City"></div>
            <div class="scene-thumb custom-thumb" id="customThumb" title="Custom background">+</div>
        </div>

        <div class="custom-panel" id="customPanel">
            <div class="input-row">
                <input type="text" id="customUrlInput" placeholder="Image URL …" spellcheck="false" />
                <button class="apply-btn" id="applyUrlBtn">Apply</button>
            </div>
            <div class="file-row">
                <label class="file-label" id="fileLabel">
                    📁 Upload photo
                    <input type="file" id="fileInput" accept="image/*" />
                </label>
                <span style="font-size:11px; color:var(--text-lo);">or</span>
                <button class="apply-btn" id="clearCustomBtn">Reset preset</button>
            </div>
            <div class="status-msg" id="customStatus"></div>
        </div>
    </div>

    <!-- ---- Todo Panel ---- -->
    <div class="todo-panel" id="todoPanel">
        <div class="header">
            <span>📋 Todo</span>
            <button class="close-btn" id="closeTodoBtn">✕</button>
        </div>
        <div class="todo-input-row">
            <input type="text" id="todoInput" placeholder="Add a task…" />
            <button class="add-btn" id="addTodoBtn">Add</button>
        </div>
        <ul class="todo-list" id="todoList">
            <li class="todo-empty">No tasks yet. Add one above!</li>
        </ul>
    </div>

    <!-- ---- control bar ---- -->
    <div class="control-bar">
        <!-- Todo Button -->
        <button class="icon-btn" id="todoToggle" title="Todo list">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
        </button>

        <!-- History Button -->
        <button class="icon-btn" id="historyToggle" title="Session History">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
        </button>

        <button class="icon-btn" id="sceneToggle" title="Change scene">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="M21 15l-5-5L5 21"/>
            </svg>
        </button>

        <button class="icon-btn" id="soundToggle" title="Toggle soft ticking">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 5 6 9H2v6h4l5 4V5z"/>
                <path d="M15.5 8.5a5 5 0 0 1 0 7"/>
            </svg>
        </button>

        <button class="icon-btn" id="ambientToggle" title="Ambient sounds">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
                <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
            </svg>
        </button>

        <button class="btn" id="startPauseBtn">Start</button>

        <button class="icon-btn" id="resetBtn" title="Reset">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"/>
                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
            </svg>
        </button>
    </div>
