<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FOCUS · by pushpraj</title>

    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <script src="pwa-register.js" defer></script>

    <!-- Supabase SDK + local configs -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-db.js"></script>

    <style>
        /* ----- Focus app design tokens ----- */
        :root {
            --text-hi: rgba(255, 255, 255, 0.96);
            --text-lo: rgba(255, 255, 255, 0.65);
            --glass: rgba(255, 255, 255, 0.10);
            --glass-border: rgba(255, 255, 255, 0.22);
            --accent-blue: #6bcbff;
            --accent-gold: #ffd93d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', "SF Pro Display", "Segoe UI", sans-serif;
        }

        body {
            position: relative;
        }

        /* ---- scenic background (same as timer/todo) ---- */
        .scene {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.4s ease;
            z-index: -3;
        }
        .scene.active {
            opacity: 1;
        }

        .scene-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg,
                    rgba(10, 12, 16, 0.38) 0%,
                    rgba(10, 12, 16, 0.12) 30%,
                    rgba(10, 12, 16, 0.28) 68%,
                    rgba(10, 12, 16, 0.55) 100%);
            z-index: -2;
            pointer-events: none;
        }

        .vignette {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            box-shadow: inset 0 0 180px rgba(0, 0, 0, 0.45);
        }

        /* ---- top bar (consistent with other pages) ---- */
        .top-bar {
            position: fixed;
            top: 20px;
            left: 26px;
            right: 26px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 5;
            color: var(--text-hi);
        }

        .logo {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: clamp(36px, 6vw, 76px);
            font-weight: 700;
            letter-spacing: 0.02em;
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
            line-height: 1.1;
            text-decoration: none;
            color: inherit;
        }
        .logo-sub {
            font-weight: 400;
            font-size: 0.32em;
            opacity: 0.8;
            letter-spacing: 0.15em;
            margin-top: -4px;
            text-transform: lowercase;
        }

        .top-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            line-height: 1.4;
        }

        .info-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .weather {
            font-size: clamp(13px, 1.2vw, 16px);
            font-weight: 500;
            color: var(--text-lo);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.02em;
            opacity: 0.9;
            min-height: 22px;
        }
        .weather .temp {
            font-weight: 600;
            color: var(--text-hi);
        }

        .clock {
            font-size: clamp(13px, 1.1vw, 16px);
            font-weight: 500;
            color: var(--text-lo);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            font-variant-numeric: tabular-nums;
        }
        .running-time {
            font-size: clamp(13px, 1.1vw, 16px);
            font-weight: 500;
            color: var(--text-lo);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
            font-variant-numeric: tabular-nums;
        }

        /* ---- auth stage (centered card) ---- */
        .auth-stage {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-top: 100px; /* space for top bar */
        }

        .glass-card {
            width: 100%;
            max-width: 420px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(28px) saturate(160%);
            -webkit-backdrop-filter: blur(28px) saturate(160%);
            border-radius: 28px;
            padding: 36px 32px 32px;
            box-shadow: 0 24px 60px -24px rgba(0, 0, 0, 0.6);
            color: var(--text-hi);
            text-align: center;
        }

        .brand-header {
            margin-bottom: 18px;
        }

        .brand-name {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .brand-tagline {
            font-size: 13px;
            color: var(--text-lo);
            letter-spacing: 0.05em;
            margin-top: 2px;
        }

        /* ---- auth tabs ---- */
        .auth-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 3px;
            margin-bottom: 18px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-lo);
            font-size: 13px;
            font-weight: 600;
            padding: 8px 0;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .tab-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ---- forms ---- */
        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
            text-align: left;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-lo);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group input {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            outline: none;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-group input:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.09);
        }

        .submit-btn {
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 6px;
            font-family: inherit;
        }

        .submit-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.24);
            transform: translateY(-1px);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .continue-btn {
            background: none;
            border: none;
            color: var(--text-lo);
            font-size: 12px;
            font-weight: 500;
            text-decoration: underline;
            cursor: pointer;
            transition: color 0.2s ease;
            margin-top: 10px;
            font-family: inherit;
        }

        .continue-btn:hover {
            color: #fff;
        }

        /* ---- credential warning ---- */
        .creds-warning {
            background: rgba(255, 178, 54, 0.08);
            border: 1px solid rgba(255, 178, 54, 0.25);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 12px;
            color: #ffd899;
            line-height: 1.45;
            text-align: left;
            margin-bottom: 14px;
            display: none;
        }

        .creds-warning code {
            font-family: monospace;
            background: rgba(255, 178, 54, 0.15);
            padding: 1px 4px;
            border-radius: 4px;
        }

        /* ---- toast notification ---- */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(50px);
            opacity: 0;
            background: rgba(255, 92, 92, 0.15);
            border: 1px solid rgba(255, 92, 92, 0.35);
            border-radius: 10px;
            padding: 12px 24px;
            font-size: 13px;
            color: #ffb8b8;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }

        .toast.success {
            background: rgba(82, 196, 26, 0.15);
            border-color: rgba(82, 196, 26, 0.35);
            color: #b7eb8f;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ---- floating timer badge (consistent) ---- */
        #bgTimerBadge {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(20, 20, 30, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            border-radius: 40px;
            padding: 8px 18px 8px 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            color: rgba(255, 255, 255, 0.92);
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.02em;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.45s cubic-bezier(.34, 1.56, .64, 1), box-shadow 0.3s;
            user-select: none;
        }
        #bgTimerBadge.visible {
            transform: translateX(-50%) translateY(0);
        }
        #bgTimerBadge .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #5ef08a;
            box-shadow: 0 0 8px #5ef08a;
            flex-shrink: 0;
            animation: badgePulse 1.4s ease-in-out infinite;
        }
        @keyframes badgePulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.55; transform: scale(0.8); }
        }
        #bgTimerBadge .badge-label { opacity: 0.65; margin-right: 2px; }
        #bgTimerBadge .badge-time { font-variant-numeric: tabular-nums; font-weight: 600; }
        #bgTimerBadge .badge-goto { opacity: 0.55; font-size: 11px; margin-left: 4px; }

        /* ---- responsive ---- */
        @media (max-width: 480px) {
            .top-bar {
                top: 14px;
                left: 16px;
                right: 16px;
            }
            .logo {
                font-size: clamp(28px, 5vw, 42px);
            }
            .logo-sub {
                font-size: 0.3em;
                margin-top: -3px;
            }
            .glass-card {
                padding: 28px 20px 24px;
                border-radius: 24px;
            }
            .brand-name {
                font-size: 28px;
            }
            .input-group input {
                font-size: 14px;
                padding: 10px 14px;
            }
            .submit-btn {
                font-size: 14px;
                padding: 11px;
            }
            .weather {
                font-size: 12px;
                min-height: 18px;
            }
            .clock {
                font-size: 12px;
            }
            .running-time {
                font-size: 12px;
            }
        }

        @media (max-width: 380px) {
            .glass-card {
                padding: 20px 16px 18px;
                border-radius: 20px;
            }
            .brand-name {
                font-size: 24px;
            }
            .input-group input {
                font-size: 13px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ---- scenic background (rain scene) ---- -->
    <div class="scene active" id="scene-rain" style="background-image:url('https://flocus.com/aesthetic-stopwatch/resources/images/themes/b075c800cadd3c9d930f.jpg');"></div>
    <div class="scene-overlay"></div>
    <div class="vignette"></div>

    <!-- ---- top bar (same as other pages) ---- -->
    <div class="top-bar">
        <a href="/" class="logo">
            FOCUS
            <span class="logo-sub">by pushpraj</span>
        </a>
        <div class="top-right">
            <div class="info-row">
                <div class="weather" id="weatherDisplay">⛅ <span class="temp">--°</span></div>
            </div>
            <div class="clock" id="clock">--:--</div>
            <div class="running-time" id="runningTime">--:--:--</div>
        </div>
    </div>

    <!-- ---- auth stage ---- -->
    <div class="auth-stage">
        <div class="glass-card">
            <div class="brand-header">
                <div class="brand-name">Focus</div>
                <div class="brand-tagline">Timeless, distraction‑free</div>
            </div>

            <!-- Credentials Warning -->
            <div class="creds-warning" id="credsWarning">
                ⚠️ <strong>Configuration required:</strong> Please update <code>supabase-config.js</code> with your Supabase URL and Anon Key. In the meantime, you can click "Continue offline" below.
            </div>

            <!-- Auth Tabs -->
            <div class="auth-tabs">
                <button class="tab-btn active" id="tabSignup">Sign Up</button>
                <button class="tab-btn" id="tabLogin">Log In</button>
            </div>

            <!-- Form -->
            <form id="authForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com" />
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required minlength="6" placeholder="At least 6 characters" />
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Create Account</button>
            </form>

            <button class="continue-btn" id="continueOfflineBtn">Continue offline without account</button>
        </div>
    </div>

    <!-- ---- floating timer badge (consistent) ---- -->
    <a href="timer.html" id="bgTimerBadge" title="Timer running in background – click to go back">
        <span class="badge-dot"></span>
        <span class="badge-label">⏱</span>
        <span class="badge-time" id="bgTimerTime">--:--</span>
        <span class="badge-goto">→ timer</span>
    </a>

    <!-- ---- toast notification ---- -->
    <div class="toast" id="toast">Error message here</div>

    <script>
        // ---- Clock & Weather (same as other pages) ----
        (function() {
            const clockEl = document.getElementById('clock');
            const runningTimeEl = document.getElementById('runningTime');
            const weatherDisplay = document.getElementById('weatherDisplay');

            function updateClock() {
                const now = new Date();
                const dateOptions = { month: 'short', day: '2-digit', year: 'numeric' };
                const dateStr = now.toLocaleString('en-US', dateOptions);
                clockEl.textContent = dateStr;
                const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
                const timeStr = now.toLocaleString('en-US', timeOptions);
                runningTimeEl.textContent = timeStr;
            }
            updateClock();
            setInterval(updateClock, 1000);

            async function fetchWeather() {
                try {
                    const pos = await new Promise((resolve, reject) => {
                        if (!navigator.geolocation) reject('Geolocation not supported');
                        navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000 });
                    });
                    const { latitude, longitude } = pos.coords;
                    const url =
                        `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&timezone=auto`;
                    const resp = await fetch(url);
                    const data = await resp.json();
                    if (data.current_weather) {
                        const temp = Math.round(data.current_weather.temperature);
                        let tempStr = temp.toString();
                        if (tempStr.startsWith('+')) tempStr = tempStr.substring(1);
                        weatherDisplay.innerHTML = `⛅ <span class="temp">${tempStr}°</span>`;
                    }
                } catch (_) {
                    try {
                        const resp = await fetch('https://wttr.in/?format=%t&lang=en');
                        const text = await resp.text();
                        const match = text.match(/([+-]?\d+°C)/);
                        if (match) {
                            const tempNum = parseFloat(match[1]);
                            weatherDisplay.innerHTML = `⛅ <span class="temp">${tempNum}°</span>`;
                        } else {
                            throw new Error('No temp');
                        }
                    } catch (_2) {
                        weatherDisplay.innerHTML = `⛅ <span class="temp">--°</span>`;
                    }
                }
            }
            fetchWeather();
            setInterval(fetchWeather, 600000);
        })();

        // ---- Floating timer badge ----
        (function() {
            const badge = document.getElementById('bgTimerBadge');
            const timeEl = document.getElementById('bgTimerTime');
            const KEY = 'focusTimerState';

            function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

            function fmt(ms) {
                const totalSec = Math.max(0, Math.floor(ms / 1000));
                const h = Math.floor(totalSec / 3600);
                const m = Math.floor((totalSec % 3600) / 60);
                const s = totalSec % 60;
                return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
            }

            function update() {
                try {
                    const raw = localStorage.getItem(KEY);
                    if (!raw) { badge.classList.remove('visible'); return; }
                    const st = JSON.parse(raw);
                    if (!st || !st.running) { badge.classList.remove('visible'); return; }
                    const passedMs = Date.now() - st.startTimestamp;
                    const totalElapsed = (st.accumulatedMs || 0) + passedMs;
                    let display;
                    if (st.mode === 'stopwatch') {
                        display = fmt(totalElapsed);
                    } else {
                        const left = Math.max(0, st.initialMs - totalElapsed);
                        if (left <= 0) { badge.classList.remove('visible'); return; }
                        display = fmt(left);
                    }
                    timeEl.textContent = display;
                    badge.classList.add('visible');
                } catch (_) {
                    badge.classList.remove('visible');
                }
            }
            update();
            setInterval(update, 500);
        })();

        // ---- Auth logic (unchanged from original) ----
        (function() {
            const tabSignup = document.getElementById('tabSignup');
            const tabLogin = document.getElementById('tabLogin');
            const submitBtn = document.getElementById('submitBtn');
            const authForm = document.getElementById('authForm');
            const continueOfflineBtn = document.getElementById('continueOfflineBtn');
            const credsWarning = document.getElementById('credsWarning');
            const toast = document.getElementById('toast');

            let isSignUpMode = true;

            // Check if Supabase config exists
            if (!window.supabaseDb || !window.supabaseDb.isConfigured()) {
                credsWarning.style.display = 'block';
                tabSignup.disabled = true;
                tabLogin.disabled = true;
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
                submitBtn.style.cursor = 'not-allowed';
            }

            // Tab switching
            tabSignup.addEventListener('click', () => {
                if (!window.supabaseDb || !window.supabaseDb.isConfigured()) return;
                isSignUpMode = true;
                tabSignup.classList.add('active');
                tabLogin.classList.remove('active');
                submitBtn.textContent = 'Create Account';
            });

            tabLogin.addEventListener('click', () => {
                if (!window.supabaseDb || !window.supabaseDb.isConfigured()) return;
                isSignUpMode = false;
                tabLogin.classList.add('active');
                tabSignup.classList.remove('active');
                submitBtn.textContent = 'Log In';
            });

            // Continue offline
            continueOfflineBtn.addEventListener('click', () => {
                localStorage.setItem('auth_continue_without_account', 'true');
                window.location.href = 'dashboard.html';
            });

            // Form submit
            authForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!window.supabaseDb || !window.supabaseDb.isConfigured()) return;

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                submitBtn.disabled = true;
                submitBtn.textContent = isSignUpMode ? 'Creating...' : 'Logging in...';

                try {
                    let authResponse;
                    if (isSignUpMode) {
                        authResponse = await window.supabaseClient.auth.signUp({ email, password });
                    } else {
                        authResponse = await window.supabaseClient.auth.signInWithPassword({ email, password });
                    }

                    if (authResponse.error) {
                        throw authResponse.error;
                    }

                    const user = authResponse.data.user;
                    if (user) {
                        showToast(isSignUpMode ? 'Account created successfully!' : 'Logged in successfully!', true);

                        // Check online data existence
                        const [todosRes, sessionsRes, presetsRes] = await Promise.all([
                            window.supabaseClient.from('todos').select('id', { count: 'exact', head: true }).eq('user_id', user.id),
                            window.supabaseClient.from('focus_sessions').select('id', { count: 'exact', head: true }).eq('user_id', user.id),
                            window.supabaseClient.from('focus_presets').select('id', { count: 'exact', head: true }).eq('user_id', user.id)
                        ]);

                        const onlineDataCount = (todosRes.count || 0) + (sessionsRes.count || 0) + (presetsRes.count || 0);

                        if (onlineDataCount > 0) {
                            // Load online data, ignore local
                            window.supabaseDb.clearLocalFocusData();
                            const [onlineTodos, onlineSessions, onlinePresets, profile] = await Promise.all([
                                window.supabaseDb.fetchTodos(),
                                window.supabaseDb.fetchSessions(),
                                window.supabaseDb.fetchPresets(),
                                window.supabaseDb.fetchProfile()
                            ]);
                            localStorage.setItem('todos', JSON.stringify(onlineTodos));
                            localStorage.setItem('focusSessions', JSON.stringify(onlineSessions));
                            localStorage.setItem('focusPresets', JSON.stringify(onlinePresets));
                            if (profile && profile.scene_state) {
                                localStorage.setItem('sceneState', profile.scene_state);
                                try {
                                    const stateObj = JSON.parse(profile.scene_state);
                                    if (stateObj.activeId) {
                                        localStorage.setItem('bgScene', stateObj.activeId);
                                        if (stateObj.activeId === 'scene-custom' && stateObj.customDataUrl) {
                                            localStorage.setItem('customBg', stateObj.customDataUrl);
                                        }
                                    }
                                } catch (_) {}
                            }
                        } else {
                            // No online data – check local data
                            const localTodosCount = JSON.parse(localStorage.getItem('todos') || '[]').length;
                            const localSessionsCount = JSON.parse(localStorage.getItem('focusSessions') || '[]').length;
                            const localPresetsCount = JSON.parse(localStorage.getItem('focusPresets') || '[]').length;
                            if (localTodosCount > 0 || localSessionsCount > 0 || localPresetsCount > 0) {
                                localStorage.setItem('auth_prompt_merge_data', 'true');
                            }
                        }

                        localStorage.removeItem('auth_continue_without_account');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 800);
                    }
                } catch (err) {
                    console.error(err);
                    showToast(err.message || 'An error occurred during authentication.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = isSignUpMode ? 'Create Account' : 'Log In';
                }
            });

            // Toast helper
            let toastTimeout = null;

            function showToast(message, isSuccess = false) {
                clearTimeout(toastTimeout);
                toast.textContent = message;
                toast.className = 'toast';
                if (isSuccess) toast.classList.add('success');
                toast.classList.add('show');
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 3500);
            }
        })();
    </script>
</body>
</html>
