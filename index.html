<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to FOCUS</title>
    
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <script src="pwa-register.js" defer></script>

    <!-- Supabase + Local Config + Sync helper -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-db.js"></script>

    <style>
        :root {
            --text-hi: rgba(255, 255, 255, 0.96);
            --text-lo: rgba(255, 255, 255, 0.60);
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.16);
            --accent: rgba(255, 255, 255, 0.9);
            --accent-bg: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', "SF Pro Display", "Segoe UI", sans-serif;
        }

        body {
            background-color: #0b0d12;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            color: var(--text-hi);
        }

        /* Ambient background scene matching original Focus styling */
        .scenic-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #161a24 0%, #07080c 100%);
            z-index: -2;
        }
        
        .scenic-pattern {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.25;
            z-index: -1;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 24px;
            z-index: 10;
        }

        /* Glassmorphism Card styling */
        .glass-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 16px;
            padding: 36px 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 24px;
            text-align: center;
        }

        .brand-header {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .brand-name {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .brand-tagline {
            font-size: 13px;
            color: var(--text-lo);
            letter-spacing: 0.05em;
        }

        /* Tabs selector for Log In / Sign Up */
        .auth-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 3px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-lo);
            font-size: 13px;
            font-weight: 600;
            padding: 8px 0;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        /* Forms */
        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-align: left;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-lo);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 14px;
            outline: none;
            transition: all 0.25s ease;
        }

        .input-group input:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.09);
        }

        .submit-btn {
            background: #fff;
            color: #0b0d12;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 6px;
        }

        .submit-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .continue-btn {
            background: none;
            border: none;
            color: var(--text-lo);
            font-size: 12px;
            font-weight: 500;
            text-decoration: underline;
            cursor: pointer;
            transition: color 0.2s ease;
            margin-top: 8px;
        }

        .continue-btn:hover {
            color: #fff;
        }

        /* Custom Warning Box for Missing Supabase API Creds */
        .creds-warning {
            background: rgba(255, 178, 54, 0.08);
            border: 1px solid rgba(255, 178, 54, 0.25);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 12px;
            color: #ffd899;
            line-height: 1.45;
            text-align: left;
            margin-bottom: 8px;
            display: none;
        }
        .creds-warning code {
            font-family: monospace;
            background: rgba(255, 178, 54, 0.15);
            padding: 1px 4px;
            border-radius: 4px;
        }

        /* Error and Success Toast Alerts */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(50px);
            opacity: 0;
            background: rgba(255, 92, 92, 0.15);
            border: 1px solid rgba(255, 92, 92, 0.35);
            border-radius: 10px;
            padding: 12px 24px;
            font-size: 13px;
            color: #ffb8b8;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }

        .toast.success {
            background: rgba(82, 196, 26, 0.15);
            border-color: rgba(82, 196, 26, 0.35);
            color: #b7eb8f;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div class="scenic-bg"></div>
    <div class="scenic-pattern"></div>

    <div class="auth-container">
        <!-- Credentials Warning Alert -->
        <div class="creds-warning" id="credsWarning">
            ⚠️ <strong>Configuration required:</strong> Please update <code>supabase-config.js</code> with your Supabase URL and Anon Key. In the meantime, you can click "Continue offline" below.
        </div>

        <div class="glass-card">
            <div class="brand-header">
                <h1 class="brand-name">Focus</h1>
                <span class="brand-tagline">Timeless, distraction‑free</span>
            </div>

            <!-- Tab Switcher (Signup active by default) -->
            <div class="auth-tabs">
                <button class="tab-btn active" id="tabSignup">Sign Up</button>
                <button class="tab-btn" id="tabLogin">Log In</button>
            </div>

            <!-- Signup Form (visible by default) -->
            <form id="authForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required minlength="6" placeholder="At least 6 characters">
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Create Account</button>
            </form>

            <button class="continue-btn" id="continueOfflineBtn">Continue offline without account</button>
        </div>
    </div>

    <!-- Toast Notification Popup -->
    <div class="toast" id="toast">Error message here</div>

    <script>
        // Form views configuration
        const tabSignup = document.getElementById('tabSignup');
        const tabLogin = document.getElementById('tabLogin');
        const submitBtn = document.getElementById('submitBtn');
        const authForm = document.getElementById('authForm');
        const continueOfflineBtn = document.getElementById('continueOfflineBtn');
        const credsWarning = document.getElementById('credsWarning');
        const toast = document.getElementById('toast');

        let isSignUpMode = true; // Opens signup option by default

        // Check if configuration exists
        if (!window.supabaseDb.isConfigured()) {
            credsWarning.style.display = 'block';
            tabSignup.disabled = true;
            tabLogin.disabled = true;
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.5';
            submitBtn.style.cursor = 'not-allowed';
        }

        // Tab switcher listeners
        tabSignup.addEventListener('click', () => {
            if (!window.supabaseDb.isConfigured()) return;
            isSignUpMode = true;
            tabSignup.classList.add('active');
            tabLogin.classList.remove('active');
            submitBtn.textContent = 'Create Account';
        });

        tabLogin.addEventListener('click', () => {
            if (!window.supabaseDb.isConfigured()) return;
            isSignUpMode = false;
            tabLogin.classList.add('active');
            tabSignup.classList.remove('active');
            submitBtn.textContent = 'Log In';
        });

        // Offline button listener
        continueOfflineBtn.addEventListener('click', () => {
            localStorage.setItem('auth_continue_without_account', 'true');
            window.location.href = 'dashboard.html';
        });

        // Form Submit Handler
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!window.supabaseDb.isConfigured()) return;

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.textContent = isSignUpMode ? 'Creating...' : 'Logging in...';

            try {
                let authResponse;
                if (isSignUpMode) {
                    authResponse = await window.supabaseClient.auth.signUp({ email, password });
                } else {
                    authResponse = await window.supabaseClient.auth.signInWithPassword({ email, password });
                }

                if (authResponse.error) {
                    throw authResponse.error;
                }

                const user = authResponse.data.user;
                if (user) {
                    showToast(isSignUpMode ? 'Account created successfully!' : 'Logged in successfully!', true);
                    
                    // Authentication was successful! Now let's handle the Sync checks.
                    
                    // Check if the online database already contains data for this user
                    const [todosRes, sessionsRes, presetsRes] = await Promise.all([
                        window.supabaseClient.from('todos').select('id', { count: 'exact', head: true }).eq('user_id', user.id),
                        window.supabaseClient.from('focus_sessions').select('id', { count: 'exact', head: true }).eq('user_id', user.id),
                        window.supabaseClient.from('focus_presets').select('id', { count: 'exact', head: true }).eq('user_id', user.id)
                    ]);

                    const onlineDataCount = (todosRes.count || 0) + (sessionsRes.count || 0) + (presetsRes.count || 0);

                    if (onlineDataCount > 0) {
                        // User already has online data - "ignore the local one completely and load that data"
                        window.supabaseDb.clearLocalFocusData();

                        // Fetch everything online and cache in local storage
                        const [onlineTodos, onlineSessions, onlinePresets, profile] = await Promise.all([
                            window.supabaseDb.fetchTodos(),
                            window.supabaseDb.fetchSessions(),
                            window.supabaseDb.fetchPresets(),
                            window.supabaseDb.fetchProfile()
                        ]);

                        localStorage.setItem('todos', JSON.stringify(onlineTodos));
                        localStorage.setItem('focusSessions', JSON.stringify(onlineSessions));
                        localStorage.setItem('focusPresets', JSON.stringify(onlinePresets));

                        if (profile && profile.scene_state) {
                            localStorage.setItem('sceneState', profile.scene_state);
                            try {
                                const stateObj = JSON.parse(profile.scene_state);
                                if (stateObj.activeId) {
                                    localStorage.setItem('bgScene', stateObj.activeId);
                                    if (stateObj.activeId === 'scene-custom' && stateObj.customDataUrl) {
                                        localStorage.setItem('customBg', stateObj.customDataUrl);
                                    }
                                }
                            } catch (_) {}
                        }
                    } else {
                        // Account has NO online data. Check if there is local data on this device
                        const localTodosCount = JSON.parse(localStorage.getItem('todos') || '[]').length;
                        const localSessionsCount = JSON.parse(localStorage.getItem('focusSessions') || '[]').length;
                        const localPresetsCount = JSON.parse(localStorage.getItem('focusPresets') || '[]').length;

                        const hasLocalData = localTodosCount > 0 || localSessionsCount > 0 || localPresetsCount > 0;

                        if (hasLocalData) {
                            // Set a flag to trigger the merge dialog popup inside dashboard.html
                            localStorage.setItem('auth_prompt_merge_data', 'true');
                        }
                    }

                    // Remove continue without account flag since they are officially logged in
                    localStorage.removeItem('auth_continue_without_account');

                    // Small timeout for smooth toast visualization before page redirect
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 800);
                }

            } catch (err) {
                console.error(err);
                showToast(err.message || 'An error occurred during authentication.');
                submitBtn.disabled = false;
                submitBtn.textContent = isSignUpMode ? 'Create Account' : 'Log In';
            }
        });

        // Toast Helper
        let toastTimeout = null;
        function showToast(message, isSuccess = false) {
            clearTimeout(toastTimeout);
            toast.textContent = message;
            toast.className = 'toast';
            if (isSuccess) toast.classList.add('success');
            toast.classList.add('show');
            
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);
        }
    </script>
</body>
</html>
